<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>진실 or 도전 — 모임 게임 모음집</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f8f8f6;
      --gray-50: #f5f5f3;
      --gray-100: #ebebea;
      --gray-200: #d8d8d6;
      --gray-400: #a0a09e;
      --gray-600: #6b6b69;
      --gray-800: #2d2d2b;
      --black: #1a1a18;

      --accent: #ef4444;
      --accent-rgb: 239, 68, 68;
      --accent-light: #fef2f2;

      --truth: #3b82f6;
      --truth-rgb: 59, 130, 246;
      --truth-light: #eff6ff;

      --dare: #f43f5e;
      --dare-rgb: 244, 63, 94;
      --dare-light: #fff1f2;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);

      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --transition: 300ms cubic-bezier(.4, 0, .2, 1);
    }

    /* ─── Dark Mode ─────────────────────────────────────────────────── */
    html[data-theme="dark"] {
      --white: #1e1e22;
      --off-white: #121214;
      --gray-50: #252528;
      --gray-100: #2e2e32;
      --gray-200: #3e3e42;
      --gray-400: #7a7a7e;
      --gray-600: #a5a5a9;
      --gray-800: #dcdce0;
      --black: #f0f0f2;

      --accent-light: #2a0a0a;
      --truth-light: #0f1929;
      --dare-light: #200d11;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.25);
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Topbar ────────────────────────────────────────────────────── */
    .game-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--gray-100);
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    [data-theme="dark"] .game-topbar {
      background: rgba(18, 18, 20, .92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray-600);
      transition: background var(--transition), border-color var(--transition);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { background: var(--gray-50); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }
    .topbar-title .emoji { margin-right: 4px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Theme Toggle ──────────────────────────────────────────────── */
    .btn-theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: background var(--transition), border-color var(--transition);
      color: var(--gray-600);
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-theme-toggle:hover { background: var(--gray-50); border-color: var(--gray-400); }

    /* ─── Main Layout ───────────────────────────────────────────────── */
    .main {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Screen management ─────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════════
       SCREEN: LEVEL SELECT
    ══════════════════════════════════════════════════════════════ */
    #screen-levels {
      padding: 24px 20px 32px;
      align-items: flex-start;
    }

    .levels-header {
      margin-bottom: 28px;
      text-align: center;
      width: 100%;
    }

    .levels-hero-icon {
      font-size: 52px;
      margin-bottom: 12px;
      display: block;
    }

    .levels-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
      margin-bottom: 6px;
    }

    .levels-desc {
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.6;
    }

    .levels-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
    }

    .level-card {
      background: var(--white);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 22px 20px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition),
                  transform var(--transition), background var(--transition);
      display: flex;
      align-items: center;
      gap: 16px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .level-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity var(--transition);
      pointer-events: none;
    }

    .level-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
    .level-card:active { transform: translateY(0) scale(.98); }

    .level-card[data-level="mild"]    { border-color: rgba(34,197,94,.35); }
    .level-card[data-level="spicy"]   { border-color: rgba(249,115,22,.35); }
    .level-card[data-level="extreme"] { border-color: rgba(239,68,68,.35); }

    .level-card[data-level="mild"]::before    { background: linear-gradient(135deg, rgba(34,197,94,.06) 0%, transparent 60%); opacity: 1; }
    .level-card[data-level="spicy"]::before   { background: linear-gradient(135deg, rgba(249,115,22,.06) 0%, transparent 60%); opacity: 1; }
    .level-card[data-level="extreme"]::before { background: linear-gradient(135deg, rgba(239,68,68,.06) 0%, transparent 60%); opacity: 1; }

    .level-card:hover[data-level="mild"]    { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.12), var(--shadow-md); }
    .level-card:hover[data-level="spicy"]   { border-color: #f97316; box-shadow: 0 0 0 3px rgba(249,115,22,.12), var(--shadow-md); }
    .level-card:hover[data-level="extreme"] { border-color: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.12), var(--shadow-md); }

    .level-icon-wrap {
      width: 56px;
      height: 56px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }

    .level-card[data-level="mild"]    .level-icon-wrap { background: rgba(34,197,94,.12); }
    .level-card[data-level="spicy"]   .level-icon-wrap { background: rgba(249,115,22,.12); }
    .level-card[data-level="extreme"] .level-icon-wrap { background: rgba(239,68,68,.12); }

    .level-info { flex: 1; }

    .level-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--black);
      margin-bottom: 3px;
    }

    .level-sub {
      font-size: 13px;
      color: var(--gray-600);
      margin-bottom: 6px;
    }

    .level-count-badge {
      display: inline-flex;
      align-items: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .01em;
      border-radius: 99px;
      padding: 2px 9px;
    }

    .level-card[data-level="mild"]    .level-count-badge { background: rgba(34,197,94,.14); color: #16a34a; }
    .level-card[data-level="spicy"]   .level-count-badge { background: rgba(249,115,22,.14); color: #ea580c; }
    .level-card[data-level="extreme"] .level-count-badge { background: rgba(239,68,68,.14); color: #dc2626; }

    .level-arrow {
      font-size: 18px;
      color: var(--gray-400);
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN: CARD VIEW
    ══════════════════════════════════════════════════════════════ */
    #screen-game {
      flex-direction: column;
      padding: 20px 20px 32px;
      align-items: stretch;
    }

    /* Progress row */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 400ms cubic-bezier(.4, 0, .2, 1);
    }

    .progress-label {
      font-size: 12px;
      color: var(--gray-400);
      white-space: nowrap;
      font-weight: 600;
    }

    /* ─── Flip Card ─────────────────────────────────────────────── */
    .flip-scene {
      perspective: 1000px;
      margin-bottom: 24px;
      flex: 1;
      min-height: 300px;
      max-height: 420px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .flip-card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 520ms cubic-bezier(.4, 0, .2, 1);
    }

    .flip-card.flipped { transform: rotateY(180deg); }

    .flip-card-face {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 28px;
      box-shadow: var(--shadow-lg);
    }

    /* Front face — question prompt */
    .flip-card-front {
      background: var(--white);
      border: 2px solid var(--gray-100);
    }

    .front-prompt {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--black);
      margin-bottom: 8px;
      text-align: center;
    }

    .front-sub {
      font-size: 13px;
      color: var(--gray-400);
      text-align: center;
    }

    .front-tap-icon {
      font-size: 44px;
      margin-bottom: 16px;
      animation: tapPulse 1.8s ease-in-out infinite;
    }

    @keyframes tapPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.1); opacity: .75; }
    }

    /* Back face — truth or dare */
    .flip-card-back {
      transform: rotateY(180deg);
      flex-direction: column;
      gap: 0;
    }

    .flip-card-back.type-truth {
      background: var(--truth-light);
      border: 2px solid rgba(var(--truth-rgb), .35);
    }

    .flip-card-back.type-dare {
      background: var(--dare-light);
      border: 2px solid rgba(var(--dare-rgb), .35);
    }

    .card-type-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 99px;
      padding: 5px 16px;
      margin-bottom: 20px;
      color: #fff;
    }

    .type-truth .card-type-badge { background: var(--truth); box-shadow: 0 3px 12px rgba(var(--truth-rgb),.35); }
    .type-dare  .card-type-badge { background: var(--dare);  box-shadow: 0 3px 12px rgba(var(--dare-rgb),.35); }

    .card-text {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -.025em;
      line-height: 1.55;
      text-align: center;
      color: var(--black);
      word-break: keep-all;
    }

    /* Shimmer effect on back face */
    .flip-card-back::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      pointer-events: none;
    }

    .type-truth.flip-card-back::before {
      background: linear-gradient(135deg, rgba(var(--truth-rgb),.08) 0%, transparent 65%);
    }

    .type-dare.flip-card-back::before {
      background: linear-gradient(135deg, rgba(var(--dare-rgb),.08) 0%, transparent 65%);
    }

    /* Card enter animation */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .flip-scene { animation: cardIn 350ms cubic-bezier(.4, 0, .2, 1); }

    /* ─── Action Row ─────────────────────────────────────────────── */
    .action-row {
      display: flex;
      gap: 10px;
    }

    .btn-primary {
      flex: 1;
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font);
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .btn-secondary {
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-secondary:active { transform: scale(.98); }

    .btn-prev {
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-prev:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-prev:active { transform: scale(.98); }
    .btn-prev[hidden] { display: none; }

    /* Shuffle button */
    .btn-shuffle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 14px 14px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font);
      transition: border-color var(--transition), background var(--transition),
                  color var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-shuffle:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .btn-shuffle:active { transform: scale(.95); }

    .btn-shuffle .shuffle-icon {
      font-size: 16px;
      display: inline-block;
    }
    .btn-shuffle.shuffling .shuffle-icon {
      animation: shuffleSpin 420ms cubic-bezier(.4, 0, .2, 1) forwards;
    }

    @keyframes shuffleSpin {
      0%   { transform: rotate(0deg)   scale(1);   }
      35%  { transform: rotate(200deg) scale(.8);  }
      70%  { transform: rotate(340deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1);   }
    }

    /* Level badge pill in game screen */
    .level-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em;
      border-radius: 99px;
      padding: 3px 11px;
      margin-bottom: 16px;
      align-self: flex-start;
    }

    .level-pill[data-level="mild"]    { background: rgba(34,197,94,.14); color: #16a34a; }
    .level-pill[data-level="spicy"]   { background: rgba(249,115,22,.14); color: #ea580c; }
    .level-pill[data-level="extreme"] { background: rgba(239,68,68,.14); color: #dc2626; }

    /* ══════════════════════════════════════════════════════════════
       SCREEN: END
    ══════════════════════════════════════════════════════════════ */
    #screen-end {
      padding: 40px 20px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .end-icon { font-size: 64px; margin-bottom: 16px; }
    .end-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
      margin-bottom: 8px;
    }
    .end-desc {
      font-size: 15px;
      color: var(--gray-600);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .end-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 320px;
    }

    /* ─── Responsive ────────────────────────────────────────────── */
    @media (min-width: 480px) {
      #screen-game { padding-left: 28px; padding-right: 28px; }
      .card-text { font-size: 21px; }
    }

    @media (min-width: 768px) {
      .main { max-width: 540px; margin: 0 auto; }
    }
  </style>
  <link rel="stylesheet" href="shared/transitions.css" />
</head>
<body>

  <!-- ─── Topbar ─────────────────────────────────────────────────── -->
  <header class="game-topbar">
    <div class="topbar-left">
      <a href="index.html" class="btn-back" aria-label="게임 목록으로 돌아가기">←</a>
      <span class="topbar-title"><span class="emoji">🔥</span>진실 or 도전</span>
    </div>
    <div class="topbar-right">
      <button class="btn-theme-toggle" onclick="toggleTheme()" aria-label="다크 모드 전환">🌙</button>
    </div>
  </header>

  <!-- ─── Main ───────────────────────────────────────────────────── -->
  <main class="main">

    <!-- ── Screen: Level Select ─────────────────────────────────── -->
    <section id="screen-levels" class="screen active">
      <div class="levels-header">
        <span class="levels-hero-icon">🔥</span>
        <h1 class="levels-title">진실 or 도전</h1>
        <p class="levels-desc">난이도를 골라보세요<br>카드를 탭하면 진실 or 도전이 펼쳐져요!</p>
      </div>

      <div class="levels-grid">
        <div class="level-card" data-level="mild" onclick="startGame('mild')">
          <div class="level-icon-wrap">🥗</div>
          <div class="level-info">
            <div class="level-name">순한맛</div>
            <div class="level-sub">가볍고 유쾌한 분위기</div>
            <span class="level-count-badge" id="count-mild">25장</span>
          </div>
          <span class="level-arrow">›</span>
        </div>

        <div class="level-card" data-level="spicy" onclick="startGame('spicy')">
          <div class="level-icon-wrap">🌶️</div>
          <div class="level-info">
            <div class="level-name">매운맛</div>
            <div class="level-sub">조금 더 개인적이고 짜릿하게</div>
            <span class="level-count-badge" id="count-spicy">25장</span>
          </div>
          <span class="level-arrow">›</span>
        </div>

        <div class="level-card" data-level="extreme" onclick="startGame('extreme')">
          <div class="level-icon-wrap">🔥</div>
          <div class="level-info">
            <div class="level-name">불닭맛</div>
            <div class="level-sub">깊고 솔직한 대화, 당신의 용기를!</div>
            <span class="level-count-badge" id="count-extreme">25장</span>
          </div>
          <span class="level-arrow">›</span>
        </div>
      </div>
    </section>

    <!-- ── Screen: Card View ─────────────────────────────────────── -->
    <section id="screen-game" class="screen">

      <!-- Level pill + progress -->
      <span class="level-pill" id="level-pill" data-level="mild">🥗 순한맛</span>

      <div class="progress-row">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 15</span>
      </div>

      <!-- Flip card -->
      <div class="flip-scene" id="flip-scene" onclick="flipCard()" aria-label="카드 뒤집기">
        <div class="flip-card" id="flip-card">
          <!-- Front -->
          <div class="flip-card-face flip-card-front" id="card-front">
            <div class="front-tap-icon">👆</div>
            <div class="front-prompt">카드를 탭해서 공개!</div>
            <div class="front-sub">진실 or 도전이 결정됩니다</div>
          </div>
          <!-- Back -->

        document.documentElement.setAttribute('data-theme', 'dark');

      updateThemeIcon();

      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    // STATE
    // ══════════════════════════════════════════════════════════════
    var state = {
      level: 'mild',
      queue: [],
      position: 0,
      isFlipped: false,
    };

    // ══════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function () {
      updateCounts();
    });

    function updateCounts() {
      ['mild', 'spicy', 'extreme'].forEach(function (lvl) {
        var n = CARDS.filter(function (c) { return c.level === lvl; }).length;
        var el = document.getElementById('count-' + lvl);
        if (el) el.textContent = n + '장';
      });
    }

    // ══════════════════════════════════════════════════════════════
    // FISHER-YATES SHUFFLE
    // ══════════════════════════════════════════════════════════════
    function shuffle(arr) {
      var result = arr.slice();
      for (var i = result.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = result[i];
        result[i] = result[j];
        result[j] = tmp;
      }
      return result;
    }

    // ══════════════════════════════════════════════════════════════
    // LEVEL META
    // ══════════════════════════════════════════════════════════════
    var LEVEL_META = {
      mild:    { emoji: '🥗', label: '순한맛' },
      spicy:   { emoji: '🌶️', label: '매운맛' },
      extreme: { emoji: '🔥', label: '불닭맛' },
    };

    // ══════════════════════════════════════════════════════════════
    // SCREEN MANAGEMENT
    // ══════════════════════════════════════════════════════════════
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
    }

    // ══════════════════════════════════════════════════════════════
    // GAME FLOW
    // ══════════════════════════════════════════════════════════════
    function startGame(level) {
      state.level = level;
      var pool = CARDS.filter(function (c) { return c.level === level; });
      state.queue = shuffle(pool);
      state.position = 0;
      state.isFlipped = false;

      // Update level pill
      var meta = LEVEL_META[level];
      var pill = document.getElementById('level-pill');
      pill.setAttribute('data-level', level);
      pill.textContent = meta.emoji + ' ' + meta.label;

      showScreen('screen-game');
      renderCard();
    }

    function renderCard() {
      var card = state.queue[state.position];
      if (!card) { showScreen('screen-end'); return; }

      // Reset flip state
      state.isFlipped = false;
      var flipCard = document.getElementById('flip-card');
      flipCard.classList.remove('flipped');

      // Pre-populate the back face content (hidden until flip)
      var back = document.getElementById('card-back');
      var badge = document.getElementById('card-type-badge');
      var text = document.getElementById('card-text');

      back.className = 'flip-card-face flip-card-back ' +
        (card.type === 'truth' ? 'type-truth' : 'type-dare');

      if (card.type === 'truth') {
        badge.textContent = '💬 진실';
      } else {
        badge.textContent = '💪 도전';
      }
      text.textContent = card.text;

      // Prev button
      document.getElementById('btn-prev').hidden = (state.position === 0);

      // Next button label
      document.getElementById('btn-next').textContent =
        state.position < state.queue.length - 1 ? '다음 카드 →' : '결과 화면 →';

      // Animate card re-entry
      var scene = document.getElementById('flip-scene');
      scene.style.animation = 'none';
      void scene.offsetWidth;
      scene.style.animation = '';

      // Progress
      var pct = (state.position / state.queue.length) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent =
        (state.position + 1) + ' / ' + state.queue.length;
    }

    function flipCard() {
      var flipCard = document.getElementById('flip-card');
      state.isFlipped = !state.isFlipped;
      flipCard.classList.toggle('flipped', state.isFlipped);
    }

    function nextCard() {
      state.position += 1;
      if (state.position >= state.queue.length) {
        showScreen('screen-end');
      } else {
        renderCard();
      }
    }

    function prevCard() {
      if (state.position <= 0) return;
      state.position -= 1;
      renderCard();
    }

    function shuffleQueue() {
      var btn = document.getElementById('btn-shuffle');
      var remaining = state.queue.length - state.position;
      if (remaining <= 1) return;

      var before    = state.queue.slice(0, state.position);
      var toShuffle = state.queue.slice(state.position);
      var shuffled  = shuffle(toShuffle);

      // Ensure visible change on current card
      if (shuffled.length > 1 && shuffled[0] === state.queue[state.position]) {
        var swapIdx = Math.floor(Math.random() * (shuffled.length - 1)) + 1;
        var tmp = shuffled[0];
        shuffled[0] = shuffled[swapIdx];
        shuffled[swapIdx] = tmp;
      }

      state.queue = before.concat(shuffled);
      renderCard();

      btn.classList.remove('shuffling');
      void btn.offsetWidth;
      btn.classList.add('shuffling');
      btn.addEventListener('animationend', function onEnd() {
        btn.classList.remove('shuffling');
        btn.removeEventListener('animationend', onEnd);
      });
    }

    function restartGame() {
      startGame(state.level);
    }

    function showLevels() {
      showScreen('screen-levels');
    }
  </script>
