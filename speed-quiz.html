<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>스피드 퀴즈 — 모임 게임 모음집</title>
  <link rel="stylesheet" href="shared/transitions.css" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f8f8f6;
      --gray-50: #f5f5f3;
      --gray-100: #ebebea;
      --gray-200: #d8d8d6;
      --gray-400: #a0a09e;
      --gray-600: #6b6b69;
      --gray-800: #2d2d2b;
      --black: #1a1a18;

      --accent: #8b5cf6;        /* violet — speed quiz theme */
      --accent-rgb: 139, 92, 246;
      --accent-light: #f5f3ff;

      --correct: #10b981;       /* green for correct answers */
      --correct-rgb: 16, 185, 129;
      --pass: #f97316;          /* orange for passed words */
      --pass-rgb: 249, 115, 22;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);

      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --transition: 300ms cubic-bezier(.4, 0, .2, 1);

      --bg: var(--off-white);
      --surface: var(--white);
      --text: var(--black);
      --text-secondary: var(--gray-600);
      --border: var(--gray-100);
    }

    /* ─── Dark Mode ─────────────────────────────────────────────────── */
    html[data-theme="dark"] {
      --white: #1e1e22;
      --off-white: #121214;
      --gray-50: #252528;
      --gray-100: #2e2e32;
      --gray-200: #3e3e42;
      --gray-400: #7a7a7e;
      --gray-600: #a5a5a9;
      --gray-800: #dcdce0;
      --black: #f0f0f2;

      --accent-light: #1e1a2e;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.25);
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Topbar ────────────────────────────────────────────────────── */
    .game-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--gray-100);
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    [data-theme="dark"] .game-topbar {
      background: rgba(18, 18, 20, .92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray-600);
      transition: background var(--transition), border-color var(--transition);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { background: var(--gray-50); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }
    .topbar-title .emoji { margin-right: 4px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Theme Toggle ──────────────────────────────────────────────── */
    .btn-theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: background var(--transition), border-color var(--transition);
      color: var(--gray-600);
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-theme-toggle:hover { background: var(--gray-50); border-color: var(--gray-400); }

    /* ─── Main Layout ───────────────────────────────────────────────── */
    .main {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Screen management ─────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 1: SETUP
    ══════════════════════════════════════════════════════════════ */
    #screen-setup {
      padding: 24px 20px 40px;
      gap: 24px;
      align-items: flex-start;
    }

    .setup-header {
      width: 100%;
      text-align: center;
      padding-bottom: 4px;
    }

    .setup-hero-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
    }

    .setup-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--black);
      margin-bottom: 8px;
    }

    .setup-desc {
      font-size: 14px;
      color: var(--gray-600);
      line-height: 1.7;
      word-break: keep-all;
    }

    /* Section label */
    .setup-section-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--gray-400);
      margin-bottom: 12px;
    }

    /* Category grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: 100%;
    }

    .category-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 16px 8px;
      border-radius: var(--radius-md);
      border: 2px solid var(--gray-100);
      background: var(--white);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition),
                  transform var(--transition), box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-sm);
    }
    .category-btn:hover { border-color: var(--gray-200); background: var(--gray-50); }
    .category-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .15);
    }
    .category-btn:active { transform: scale(.97); }

    .cat-icon { font-size: 28px; line-height: 1; }
    .cat-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }

    /* Timer options */
    .timer-options {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .timer-btn {
      flex: 1;
      padding: 14px 8px;
      border-radius: var(--radius-md);
      border: 2px solid var(--gray-100);
      background: var(--white);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      color: var(--black);
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition),
                  box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-sm);
    }
    .timer-btn:hover { border-color: var(--accent); }
    .timer-btn.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .15);
    }
    .timer-btn:active { transform: scale(.97); }

    /* Player row */
    .player-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      width: 100%;
    }

    .player-row .label {
      font-size: 15px;
      font-weight: 600;
      color: var(--black);
    }

    .player-stepper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-step {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: var(--gray-50);
      font-size: 20px;
      font-weight: 700;
      color: var(--black);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background var(--transition), border-color var(--transition);
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      padding: 0;
    }
    .btn-step:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); }
    .btn-step:disabled { opacity: .35; cursor: not-allowed; }

    .player-count-display {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--accent);
      min-width: 28px;
      text-align: center;
    }

    /* Start button */
    .btn-start {
      width: 100%;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), .35);
      -webkit-tap-highlight-color: transparent;
      margin-top: 4px;
    }
    .btn-start:hover { opacity: .92; box-shadow: 0 6px 24px rgba(var(--accent-rgb), .45); }
    .btn-start:active { transform: scale(.98); }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 2: GAMEPLAY
    ══════════════════════════════════════════════════════════════ */
    #screen-game {
      padding: 16px 20px 28px;
      gap: 14px;
      align-items: center;
    }

    /* Status row */
    .game-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .score-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: rgba(var(--correct-rgb), .12);
      color: var(--correct);
      font-size: 16px;
      font-weight: 800;
      padding: 6px 14px;
      border-radius: 999px;
      letter-spacing: -.02em;
    }

    .score-num {
      font-variant-numeric: tabular-nums;
    }

    .status-category {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-600);
      background: var(--gray-50);
      border: 1px solid var(--gray-100);
      padding: 5px 12px;
      border-radius: 999px;
    }

    /* Hint banner */
    .hint-banner {
      width: 100%;
      background: rgba(var(--accent-rgb), .08);
      border: 1px solid rgba(var(--accent-rgb), .2);
      border-radius: var(--radius-md);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
      letter-spacing: -.01em;
    }

    /* Word card */
    .word-card {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-xl);
      padding: 28px 24px 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--gray-100);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }

    .word-card::before {
      content: '';
      position: absolute;
      top: -40px; left: 50%; transform: translateX(-50%);
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb),.10) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(.94) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .word-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--gray-400);
    }

    .word-text {
      font-size: clamp(34px, 10vw, 56px);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1.1;
      color: var(--text);
      word-break: keep-all;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    /* Forbidden words */
    .forbidden-section {
      width: 100%;
      border-top: 1px solid var(--gray-100);
      padding-top: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .forbidden-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: #ef4444;
      opacity: .8;
    }

    .forbidden-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .forbidden-tag {
      background: rgba(239, 68, 68, .1);
      border: 1px solid rgba(239, 68, 68, .25);
      color: #ef4444;
      font-size: 14px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 999px;
      letter-spacing: -.01em;
    }

    /* Circular countdown timer */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .timer-circle-wrap {
      position: relative;
      width: 110px;
      height: 110px;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 110px;
      height: 110px;
    }

    .timer-track {
      fill: none;
      stroke: var(--gray-100);
      stroke-width: 8;
    }
    .timer-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke var(--transition);
      /* circumference = 2 * PI * 45 ≈ 282.74 */
      stroke-dasharray: 282.74;
      stroke-dashoffset: 0;
    }
    .timer-progress.warn   { stroke: var(--pass); }
    .timer-progress.danger { stroke: #ef4444; }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .timer-num {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      color: var(--text);
      transition: color var(--transition);
      font-feature-settings: "tnum";
    }
    .timer-num.warn   { color: var(--pass); }
    .timer-num.danger { color: #ef4444; }

    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }
    .timer-num.pulse { animation: timerPulse 600ms ease-in-out infinite; }

    /* Action buttons */
    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
    }

    .btn-correct {
      padding: 18px 12px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--correct);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      font-family: var(--font);
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(var(--correct-rgb), .35);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-correct:hover { opacity: .9; box-shadow: 0 6px 20px rgba(var(--correct-rgb), .4); }
    .btn-correct:active { transform: scale(.97); }

    .btn-pass {
      padding: 18px 12px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--pass);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      font-family: var(--font);
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(var(--pass-rgb), .3);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-pass:hover { opacity: .9; box-shadow: 0 6px 20px rgba(var(--pass-rgb), .4); }
    .btn-pass:active { transform: scale(.97); }

    /* Success flash overlay */
    @keyframes flashIn {
      0%   { opacity: 0; transform: scale(.8); }
      40%  { opacity: 1; transform: scale(1.1); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    .flash-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 200;
    }

    .flash-text {
      font-size: 64px;
      font-weight: 900;
      color: var(--correct);
      text-shadow: 0 2px 20px rgba(var(--correct-rgb), .4);
      opacity: 0;
    }

    .flash-text.animate {
      animation: flashIn 500ms cubic-bezier(.4, 0, .2, 1) forwards;
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 3: RESULTS
    ══════════════════════════════════════════════════════════════ */
    #screen-results {
      padding: 32px 20px 40px;
      gap: 20px;
      align-items: center;
    }

    .results-header {
      text-align: center;
    }

    .results-icon {
      font-size: 60px;
      display: block;
      margin-bottom: 12px;
    }

    .results-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.04em;
      color: var(--black);
      margin-bottom: 6px;
    }

    .results-subtitle {
      font-size: 15px;
      color: var(--gray-600);
      font-weight: 500;
    }

    /* Score cards */
    .results-scores {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      width: 100%;
    }

    .score-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      text-align: center;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--gray-100);
    }

    .correct-card { border-top: 3px solid var(--correct); }
    .pass-card    { border-top: 3px solid var(--pass); }

    .score-card-icon { font-size: 24px; margin-bottom: 6px; }
    .score-card-num  {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      color: var(--black);
      margin-bottom: 4px;
      font-variant-numeric: tabular-nums;
    }
    .correct-card .score-card-num { color: var(--correct); }
    .pass-card    .score-card-num { color: var(--pass); }
    .score-card-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
    }

    /* Word list */
    .results-list-section {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-100);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    .results-list-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--gray-400);
      padding: 14px 18px 10px;
      border-bottom: 1px solid var(--gray-100);
    }

    .results-word-list {
      display: flex;
      flex-direction: column;
    }

    .results-word-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 18px;
      font-size: 15px;
      font-weight: 600;
      color: var(--black);
      border-bottom: 1px solid var(--gray-100);
    }
    .results-word-item:last-child { border-bottom: none; }

    .result-tag {
      font-size: 11px;
      font-weight: 800;
      padding: 3px 9px;
      border-radius: 999px;
      flex-shrink: 0;
      letter-spacing: .02em;
    }
    .result-tag.correct {
      background: rgba(var(--correct-rgb), .12);
      color: var(--correct);
    }
    .result-tag.pass {
      background: rgba(var(--pass-rgb), .12);
      color: var(--pass);
    }

    .result-forbidden {
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
      margin-left: auto;
    }

    /* Result action buttons */
    .results-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-family: var(--font);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      box-shadow: 0 4px 16px rgba(var(--accent-rgb), .3);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--gray-200);
      background: var(--white);
      color: var(--black);
      font-family: var(--font);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition),
                  transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { background: var(--gray-50); border-color: var(--gray-400); }
    .btn-secondary:active { transform: scale(.98); }

  (function initTheme() {
    var saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    document.getElementById('btnTheme').textContent = saved === 'dark' ? '☀️' : '🌙';
  })();

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    document.getElementById('btnTheme').textContent = next === 'dark' ? '☀️' : '🌙';
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function (s) {
      s.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  // ──────────────────────────────────────────────────────────────────
  function renderCategoryGrid() {
    var grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    CATEGORIES.forEach(function (cat) {
      var btn = document.createElement('button');
      btn.className = 'category-btn' + (cat.id === state.selectedCategoryId ? ' selected' : '');
      btn.setAttribute('data-id', cat.id);
      btn.innerHTML =
        '<span class="cat-icon">' + cat.icon + '</span>' +
        '<span class="cat-name">' + cat.name + '</span>';
      btn.onclick = function () { selectCategory(cat.id); };
      grid.appendChild(btn);
    });
  }

  function selectCategory(id) {
    state.selectedCategoryId = id;
    document.querySelectorAll('.category-btn').forEach(function (btn) {
      btn.classList.toggle('selected', btn.getAttribute('data-id') === id);
    });
  }

  function selectTimer(secs) {
    state.timerSeconds = secs;
    document.querySelectorAll('.timer-btn').forEach(function (btn) {
      btn.classList.toggle('selected', parseInt(btn.getAttribute('data-seconds')) === secs);
    });
  }

  function changePlayerCount(delta) {
    var next = state.playerCount + delta;
    if (next < 2 || next > 10) return;
    state.playerCount = next;
    document.getElementById('playerCountDisplay').textContent = next;
    document.getElementById('btnPlayerMinus').disabled = next <= 2;
    document.getElementById('btnPlayerPlus').disabled  = next >= 10;
  }

  // ──────────────────────────────────────────────────────────────────
  // SHUFFLE (Fisher-Yates)
  // ──────────────────────────────────────────────────────────────────
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  var audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    return audioCtx;
  }

  function playBeep(freq, gain, duration) {
    var ctx = getAudioCtx();
    if (!ctx) return;
    try {
      var osc = ctx.createOscillator();
      var gainNode = ctx.createGain();
      osc.connect(gainNode);
      gainNode.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gainNode.gain.setValueAtTime(gain, ctx.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + duration);
    } catch (e) {}
  }

  function playCorrectSound() {
    playBeep(523, 0.2, 0.1);
    setTimeout(function () { playBeep(659, 0.2, 0.15); }, 80);
    setTimeout(function () { playBeep(784, 0.2, 0.2);  }, 180);
  }

  function playTimerEndSound() {
    playBeep(660, 0.15, 0.3);
    setTimeout(function () { playBeep(520, 0.15, 0.3); }, 180);
    setTimeout(function () { playBeep(440, 0.25, 0.35); }, 360);
  }

  function playTickSound() {
    playBeep(440, 0.04, 0.08);
  }

  // ──────────────────────────────────────────────────────────────────
  // TIMER ARC  (circumference = 2πr = 2×π×45 ≈ 282.74)
  // ──────────────────────────────────────────────────────────────────
  var CIRCUMFERENCE = 2 * Math.PI * 45; // ≈ 282.74

  function updateTimerArc(secondsLeft, totalSeconds) {
    var arc   = document.getElementById('timerArc');
    var num   = document.getElementById('timerNum');
    var ratio = secondsLeft / totalSeconds;
    var offset = CIRCUMFERENCE * (1 - ratio);
    arc.style.strokeDashoffset = offset;

    var warnThreshold   = totalSeconds * 0.33;
    var dangerThreshold = totalSeconds * 0.15;

    if (secondsLeft <= dangerThreshold) {
      arc.className = 'timer-progress danger';
      num.className = 'timer-num danger pulse';
    } else if (secondsLeft <= warnThreshold) {
      arc.className = 'timer-progress warn';
      num.className = 'timer-num warn';
    } else {
      arc.className = 'timer-progress';
      num.className = 'timer-num';
    }

    num.textContent = secondsLeft;
  }

  // ──────────────────────────────────────────────────────────────────
  // GAME START
  // ──────────────────────────────────────────────────────────────────
  function startGame() {
    var cat = CATEGORIES.find(function (c) { return c.id === state.selectedCategoryId; });
    if (!cat) return;

    // Unlock AudioContext on first user gesture
    getAudioCtx();
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }

    state.wordQueue   = shuffle(cat.words);
    state.wordIndex   = 0;
    state.score       = 0;
    state.passCount   = 0;
    state.timeLeft    = state.timerSeconds;
    state.playedWords = [];
    state.gameActive  = true;

    document.getElementById('gameCategory').textContent = cat.icon + ' ' + cat.name;
    document.getElementById('liveScore').textContent = '0';

    showScreen('screen-game');
    renderCurrentWord();
    startTimer();
  }

  // ──────────────────────────────────────────────────────────────────
  // WORD RENDERING
  // ──────────────────────────────────────────────────────────────────
  function renderCurrentWord() {
    var entry = state.wordQueue[state.wordIndex];
    if (!entry) entry = { word: '—', forbidden: [] };

    var wordEl = document.getElementById('wordText');
    wordEl.textContent = entry.word;

    // Render forbidden tags
    var tagsEl = document.getElementById('forbiddenTags');
    tagsEl.innerHTML = '';
    (entry.forbidden || []).forEach(function (fw) {
      var span = document.createElement('span');
      span.className = 'forbidden-tag';
      span.textContent = fw;
      tagsEl.appendChild(span);
    });

    // Animate card
    var card = document.getElementById('wordCard');
    card.style.animation = 'none';
    void card.offsetWidth; // force reflow
    card.style.animation = 'cardIn 300ms cubic-bezier(.4, 0, .2, 1)';
  }

  // ──────────────────────────────────────────────────────────────────
  // TIMER
  // ──────────────────────────────────────────────────────────────────
  function startTimer() {
    updateTimerArc(state.timeLeft, state.timerSeconds);
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(function () {
      state.timeLeft -= 1;
      updateTimerArc(state.timeLeft, state.timerSeconds);

      if (state.timeLeft > 0 && state.timeLeft <= 5) {
        playTickSound();
      }

      if (state.timeLeft <= 0) {
        clearInterval(state.timerInterval);
        state.gameActive = false;
        playTimerEndSound();
        setTimeout(showResults, 700);
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(state.timerInterval);
  }

  // ──────────────────────────────────────────────────────────────────
  // FLASH ANIMATION
  // ──────────────────────────────────────────────────────────────────
  function showFlash() {
    var el = document.getElementById('flashText');
    el.classList.remove('animate');
    void el.offsetWidth;
    el.classList.add('animate');
  }

  // ──────────────────────────────────────────────────────────────────
  // GAMEPLAY ACTIONS
  // ──────────────────────────────────────────────────────────────────
  function getNextQueue() {
    var cat = CATEGORIES.find(function (c) { return c.id === state.selectedCategoryId; });
    return shuffle(cat ? cat.words : []);
  }

  function handleCorrect() {
    if (!state.gameActive) return;
    var entry = state.wordQueue[state.wordIndex];
    if (!entry) return;

    state.score += 1;
    state.playedWords.push({ word: entry.word, forbidden: entry.forbidden, result: 'correct' });
    state.wordIndex += 1;

    document.getElementById('liveScore').textContent = state.score;
    playCorrectSound();
    showFlash();

    if (state.wordIndex >= state.wordQueue.length) {
      state.wordQueue = state.wordQueue.concat(getNextQueue());
    }
    renderCurrentWord();
  }

  function handlePass() {
    if (!state.gameActive) return;
    var entry = state.wordQueue[state.wordIndex];
    if (!entry) return;

    state.passCount += 1;
    state.playedWords.push({ word: entry.word, forbidden: entry.forbidden, result: 'pass' });
    state.wordIndex += 1;

    if (state.wordIndex >= state.wordQueue.length) {
      state.wordQueue = state.wordQueue.concat(getNextQueue());
    }
    renderCurrentWord();
  }

  // ──────────────────────────────────────────────────────────────────
  // RESULTS SCREEN
  // ──────────────────────────────────────────────────────────────────
  function showResults() {
    stopTimer();
    state.gameActive = false;

    document.getElementById('finalCorrect').textContent = state.score;
    document.getElementById('finalPass').textContent    = state.passCount;

    var icon, subtitle;
    if (state.score >= 12) {
      icon = '🏆'; subtitle = '완벽한 팀워크예요!';
    } else if (state.score >= 7) {
      icon = '🎉'; subtitle = '훌륭해요! 잘 맞혔어요!';
    } else if (state.score >= 3) {
      icon = '👏'; subtitle = '다음엔 더 잘할 수 있어요!';
    } else {
      icon = '😅'; subtitle = '금칙어가 너무 많았나요? 다시 도전!';
    }
    document.getElementById('resultsIcon').textContent     = icon;
    document.getElementById('resultsTitle').textContent    = state.score + '점 획득!';
    document.getElementById('resultsSubtitle').textContent = subtitle;

    var listEl = document.getElementById('resultsWordList');
    listEl.innerHTML = '';
    state.playedWords.forEach(function (item) {
      var div = document.createElement('div');
      div.className = 'results-word-item';
      div.innerHTML =
        '<span class="result-tag ' + item.result + '">' +
          (item.result === 'correct' ? '정답' : '패스') +
        '</span>' +
        '<span>' + item.word + '</span>' +
        '<span class="result-forbidden">' +
          (item.forbidden && item.forbidden.length ? '🚫 ' + item.forbidden.join(', ') : '') +
        '</span>';
      listEl.appendChild(div);
    });

    showScreen('screen-results');
  }

  // ──────────────────────────────────────────────────────────────────
  // RESULTS ACTIONS
  // ──────────────────────────────────────────────────────────────────
  function playAgain() {
    startGame();
  }

  function changeCategory() {
    stopTimer();
    showScreen('screen-setup');
    renderCategoryGrid();
  }

  function goHome() {
    stopTimer();
    window.location.href = 'index.html';
  }

  // ──────────────────────────────────────────────────────────────────
  // INIT
  // ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    renderCategoryGrid();
    document.getElementById('playerCountDisplay').textContent = state.playerCount;
    document.getElementById('btnPlayerMinus').disabled = state.playerCount <= 2;
    document.getElementById('btnPlayerPlus').disabled  = state.playerCount >= 10;
    updateTimerArc(state.timerSeconds, state.timerSeconds);
  });
</script>
<script src="shared/transitions.js"></script>
</body>
</html>
