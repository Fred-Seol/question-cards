<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>밸런스 게임 — 모임 게임 모음집</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f8f8f6;
      --gray-50: #f5f5f3;
      --gray-100: #ebebea;
      --gray-200: #d8d8d6;
      --gray-400: #a0a09e;
      --gray-600: #6b6b69;
      --gray-800: #2d2d2b;
      --black: #1a1a18;

      --accent: #8b5cf6;   /* violet – matches life theme */
      --accent-rgb: 139, 92, 246;
      --accent-light: #f5f3ff;

      --option-a: #3b82f6;  /* blue */
      --option-a-rgb: 59, 130, 246;
      --option-a-light: #eff6ff;
      --option-b: #f43f5e;  /* rose */
      --option-b-rgb: 244, 63, 94;
      --option-b-light: #fff1f2;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);

      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --transition: 300ms cubic-bezier(.4, 0, .2, 1);
    }

    /* ─── Dark Mode ─────────────────────────────────────────────────── */
    html[data-theme="dark"] {
      --white: #1e1e22;
      --off-white: #121214;
      --gray-50: #252528;
      --gray-100: #2e2e32;
      --gray-200: #3e3e42;
      --gray-400: #7a7a7e;
      --gray-600: #a5a5a9;
      --gray-800: #dcdce0;
      --black: #f0f0f2;

      --accent-light: #1e1a2e;
      --option-a-light: #0f1929;
      --option-b-light: #200d11;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.25);
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Topbar ────────────────────────────────────────────────────── */
    .game-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--gray-100);
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    [data-theme="dark"] .game-topbar {
      background: rgba(18, 18, 20, .92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray-600);
      transition: background var(--transition), border-color var(--transition);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { background: var(--gray-50); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }
    .topbar-title .emoji { margin-right: 4px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Theme Toggle ──────────────────────────────────────────────── */
    .btn-theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: background var(--transition), border-color var(--transition);
      color: var(--gray-600);
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-theme-toggle:hover { background: var(--gray-50); border-color: var(--gray-400); }

    /* ─── Main Layout ───────────────────────────────────────────────── */
    .main {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Screen management ─────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════════
       SCREEN: CATEGORY SELECT
    ══════════════════════════════════════════════════════════════ */
    #screen-categories {
      padding: 24px 20px 32px;
      align-items: flex-start;
    }

    .categories-header {
      margin-bottom: 24px;
      text-align: center;
      width: 100%;
    }

    .categories-hero-icon {
      font-size: 48px;
      margin-bottom: 12px;
      display: block;
    }

    .categories-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
      margin-bottom: 6px;
    }

    .categories-desc {
      font-size: 14px;
      color: var(--gray-600);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      width: 100%;
    }

    .category-card {
      background: var(--white);
      border: 1.5px solid var(--gray-100);
      border-radius: var(--radius-lg);
      padding: 20px 16px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition),
                  transform var(--transition), background var(--transition);
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .category-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .category-card:active { transform: translateY(0); }

    .category-card.all { grid-column: 1 / -1; }

    .category-icon { font-size: 28px; line-height: 1; }
    .category-name {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }
    .category-count {
      font-size: 12px;
      color: var(--gray-400);
    }

    /* ──────────────── Category color accents ──────────────────── */
    .category-card[data-cat="all"]      { border-color: rgba(139,92,246,.3);  }
    .category-card[data-cat="lifestyle"]    { border-color: rgba(59,130,246,.3); }
    .category-card[data-cat="values"]      { border-color: rgba(244,63,94,.3);   }
    .category-card[data-cat="fun"]         { border-color: rgba(249,115,22,.3);  }
    .category-card[data-cat="deep"]        { border-color: rgba(16,185,129,.3);  }
    .category-card[data-cat="relationship"]{ border-color: rgba(236,72,153,.3);  }
    .category-card[data-cat="imagine"]     { border-color: rgba(168,85,247,.3);  }

    [data-theme="dark"] .category-card { border-color: var(--gray-100); }

    /* ══════════════════════════════════════════════════════════════
       SCREEN: GAME PLAY
    ══════════════════════════════════════════════════════════════ */
    #screen-game {
      flex-direction: column;
      padding: 20px 20px 32px;
      align-items: stretch;
    }

    /* Progress bar */
    .progress-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 12px;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 400ms cubic-bezier(.4, 0, .2, 1);
    }

    .progress-label {
      font-size: 12px;
      color: var(--gray-400);
      white-space: nowrap;
    }

    /* Question card */
    .question-card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 28px 24px;
      margin-bottom: 20px;
      text-align: center;
      transition: background var(--transition), box-shadow var(--transition);
      animation: cardIn 350ms cubic-bezier(.4, 0, .2, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .question-category-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-light);
      border-radius: 99px;
      padding: 3px 10px;
      margin-bottom: 14px;
    }

    .question-vs {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* Options */
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .option-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 22px 20px;
      border-radius: var(--radius-lg);
      border: 2.5px solid transparent;
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      background: var(--off-white);
      min-height: 100px;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    /* Subtle gradient shimmer on the card */
    .option-a {
      border-color: rgba(var(--option-a-rgb), .3);
      background: var(--option-a-light);
    }
    .option-b {
      border-color: rgba(var(--option-b-rgb), .3);
      background: var(--option-b-light);
    }

    .option-a::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(var(--option-a-rgb),.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .option-b::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(var(--option-b-rgb),.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .option-a:hover,
    .option-a:focus-visible {
      border-color: var(--option-a);
      box-shadow: 0 0 0 3px rgba(var(--option-a-rgb), .14), var(--shadow-md);
      transform: translateY(-2px);
    }
    .option-b:hover,
    .option-b:focus-visible {
      border-color: var(--option-b);
      box-shadow: 0 0 0 3px rgba(var(--option-b-rgb), .14), var(--shadow-md);
      transform: translateY(-2px);
    }

    .option-a:active { transform: scale(.97); }
    .option-b:active { transform: scale(.97); }

    /* Selected state */
    .option-a.selected {
      border-color: var(--option-a);
      box-shadow: 0 0 0 3px rgba(var(--option-a-rgb), .2), var(--shadow-md);
      background: rgba(var(--option-a-rgb), .1);
    }
    .option-b.selected {
      border-color: var(--option-b);
      box-shadow: 0 0 0 3px rgba(var(--option-b-rgb), .2), var(--shadow-md);
      background: rgba(var(--option-b-rgb), .1);
    }

    /* Dimmed (other option when one is selected) */
    .option-btn.dimmed {
      opacity: 0.38;
      transform: scale(.97);
    }

    .option-label {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: .08em;
      padding: 4px 14px;
      border-radius: 99px;
      text-transform: uppercase;
    }
    .option-a .option-label {
      background: var(--option-a);
      color: #fff;
      box-shadow: 0 2px 8px rgba(var(--option-a-rgb), .35);
    }
    .option-b .option-label {
      background: var(--option-b);
      color: #fff;
      box-shadow: 0 2px 8px rgba(var(--option-b-rgb), .35);
    }

    .option-text {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
      line-height: 1.45;
      word-break: keep-all;
    }

    /* Checkmark badge shown when selected */
    .option-check {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      opacity: 0;
      transform: scale(0);
      transition: opacity 200ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1);
    }
    .option-a .option-check { background: var(--option-a); color: #fff; }
    .option-b .option-check { background: var(--option-b); color: #fff; }
    .option-btn.selected .option-check {
      opacity: 1;
      transform: scale(1);
    }

    /* Divider */
    .vs-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 0;
      position: relative;
      z-index: 1;
    }
    .vs-divider span {
      font-size: 12px;
      font-weight: 900;
      color: var(--gray-400);
      letter-spacing: .1em;
      background: var(--white);
      padding: 4px 10px;
      border-radius: 99px;
      border: 1.5px solid var(--gray-200);
      line-height: 1;
    }

    /* Oral discussion mode hint pill */
    .oral-mode-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      background: var(--gray-50);
      border: 1px solid var(--gray-100);
      border-radius: 99px;
      padding: 2px 10px;
      margin-bottom: 12px;
      letter-spacing: .01em;
    }

    /* Action buttons */
    .action-row {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-primary {
      flex: 1;
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .btn-secondary {
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-secondary:active { transform: scale(.98); }

    /* Prev button — same height as primary but fixed narrow width */
    .btn-prev {
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-prev:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-prev:active { transform: scale(.98); }
    /* Hidden when on first question */
    .btn-prev[hidden] { display: none; }

    /* ─── Shuffle Button ────────────────────────────────────────── */
    .btn-shuffle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      padding: 14px 14px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition), background var(--transition),
                  color var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .btn-shuffle:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }
    .btn-shuffle:active { transform: scale(.95); }

    .btn-shuffle .shuffle-icon {
      font-size: 16px;
      display: inline-block;
    }
    .btn-shuffle.shuffling .shuffle-icon {
      animation: shuffleSpin 420ms cubic-bezier(.4, 0, .2, 1) forwards;
    }

    @keyframes shuffleSpin {
      0%   { transform: rotate(0deg)   scale(1);   }
      35%  { transform: rotate(200deg) scale(.8);  }
      70%  { transform: rotate(340deg) scale(1.1); }
      100% { transform: rotate(360deg) scale(1);   }
    }

    /* Player count selector */
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--white);
      border-radius: var(--radius-md);
      border: 1px solid var(--gray-100);
      margin-bottom: 20px;
      transition: background var(--transition), border-color var(--transition);
    }

    .player-row .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-600);
      flex: 1;
    }

    .player-stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-step {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--black);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-step:hover { background: var(--gray-50); }
    .btn-step:disabled { opacity: .35; cursor: not-allowed; }

    .player-count-display {
      font-size: 16px;
      font-weight: 700;
      color: var(--black);
      min-width: 24px;
      text-align: center;
    }

    /* End screen */
    #screen-end {
      padding: 40px 20px;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .end-icon { font-size: 64px; margin-bottom: 16px; }
    .end-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
      margin-bottom: 8px;
    }
    .end-desc {
      font-size: 15px;
      color: var(--gray-600);
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .end-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 320px;
    }

    /* ── Category Filter Tabs ────────────────────────────────────── */
    .filter-tabs-wrapper {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -20px 16px;
      padding: 0 20px;
    }
    .filter-tabs-wrapper::-webkit-scrollbar { display: none; }

    .filter-tabs {
      display: flex;
      gap: 6px;
      width: max-content;
      padding-bottom: 2px;
    }

    .filter-tab {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      font-family: var(--font);
    }
    .filter-tab:hover {
      border-color: var(--gray-400);
      background: var(--gray-50);
    }
    .filter-tab:active { transform: scale(.95); }

    .filter-tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(var(--accent-rgb), .30);
    }
    .filter-tab[data-cat="lifestyle"].active     { background: var(--option-a); border-color: var(--option-a); box-shadow: 0 2px 8px rgba(var(--option-a-rgb),.30); }
    .filter-tab[data-cat="values"].active        { background: var(--option-b); border-color: var(--option-b); box-shadow: 0 2px 8px rgba(var(--option-b-rgb),.30); }
    .filter-tab[data-cat="fun"].active           { background: #f97316; border-color: #f97316; box-shadow: 0 2px 8px rgba(249,115,22,.30); }
    .filter-tab[data-cat="deep"].active          { background: #10b981; border-color: #10b981; box-shadow: 0 2px 8px rgba(16,185,129,.30); }
    .filter-tab[data-cat="relationship"].active  { background: #ec4899; border-color: #ec4899; box-shadow: 0 2px 8px rgba(236,72,153,.30); }
    .filter-tab[data-cat="imagine"].active       { background: #a855f7; border-color: #a855f7; box-shadow: 0 2px 8px rgba(168,85,247,.30); }

    /* ─── Responsive tweaks ─────────────────────────────────────── */
    @media (min-width: 480px) {
      #screen-game { padding-left: 28px; padding-right: 28px; }
      .filter-tabs-wrapper { margin-left: -28px; margin-right: -28px; padding-left: 28px; padding-right: 28px; }
      .option-text { font-size: 17px; }
    }

    @media (min-width: 640px) {
      .categories-grid { grid-template-columns: repeat(3, 1fr); }
      .category-card.all { grid-column: 1 / -1; }
    }

    @media (min-width: 768px) {
      .main { max-width: 540px; margin: 0 auto; }
    }
  </style>
  <link rel="stylesheet" href="shared/transitions.css" />
</head>
<body>

    // DARK MODE
    // ══════════════════════════════════════════════════════════════
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved === 'dark' || saved === 'light') {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
    }

    function updateThemeIcon() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.querySelectorAll('.btn-theme-toggle').forEach(function (btn) {
        btn.textContent = isDark ? '☀️' : '🌙';
        btn.title = isDark ? '라이트 모드로 전환' : '다크 모드로 전환';
        btn.setAttribute('aria-label', isDark ? '라이트 모드로 전환' : '다크 모드로 전환');
      });
    }

    // Apply icon once DOM is ready
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', updateThemeIcon);
    } else {
      updateThemeIcon();
    }

    // Watch for OS-level changes
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        updateThemeIcon();
      }
    });

      { cat: 'relationship', a: '친구가 나에 대해 험담하는 걸 들음', b: '영원히 모르는 채로 지냄' },
      { cat: 'relationship', a: '부모님의 연애 시절을 알게 됨', b: '영원히 모르는 게 나음' },
      { cat: 'relationship', a: '첫사랑과 다시 만남', b: '완전히 새로운 사람과 시작' },
      { cat: 'relationship', a: '상대의 과거를 모두 아는 관계', b: '서로의 현재에만 집중하는 관계' },
      { cat: 'relationship', a: '매일 30분 깊은 대화', b: '일주일에 한 번 하루 종일 함께' },
      { cat: 'relationship', a: '솔직하지만 상처를 주는 말', b: '부드럽지만 완전히 솔직하진 않은 말' },
      { cat: 'relationship', a: '나를 웃게 하는 사람', b: '나를 성장시키는 사람' },
      { cat: 'relationship', a: '외로울 때 항상 와주는 친구', b: '기쁠 때 진심으로 축하해주는 친구' },
      { cat: 'relationship', a: '나와 100% 맞지만 멀리 사는 사람', b: '70% 맞지만 매일 볼 수 있는 사람' },
      { cat: 'relationship', a: '10년 우정에 큰 배신 한 번', b: '1년 우정을 여러 번 반복' },
      { cat: 'relationship', a: '가족이 내 꿈을 응원하지만 도와줄 수 없음', b: '가족이 도울 수 있지만 꿈을 반대함' },

      // ─── 상상 ─────────────────────────────────────────────────
      { cat: 'imagine', a: '동물과 대화하는 능력', b: '식물의 감정을 느끼는 능력' },
      { cat: 'imagine', a: '24시간 동안 투명인간', b: '24시간 동안 하늘을 날 수 있음' },
      { cat: 'imagine', a: '어떤 시대든 갈 수 있지만 1시간만', b: '한 시대에만 갈 수 있지만 1년간' },
      { cat: 'imagine', a: '꿈에서 원하는 세계를 만들 수 있음', b: '현실에서 하루에 한 가지 소원을 빌 수 있음 (작은 것만)' },
      { cat: 'imagine', a: '모든 악기를 마스터', b: '모든 스포츠를 마스터' },
      { cat: 'imagine', a: '지구가 아닌 행성에서 1년 살기', b: '깊은 바다 속 도시에서 1년 살기' },
      { cat: 'imagine', a: '내가 쓴 소설이 현실이 됨', b: '내가 그린 그림이 현실이 됨' },
      { cat: 'imagine', a: '10년 뒤의 나에게 편지를 받음', b: '10년 전의 나에게 편지를 보냄' },
      { cat: 'imagine', a: '어떤 잠금장치든 열 수 있는 능력', b: '어떤 언어든 즉시 이해하는 능력' },
      { cat: 'imagine', a: '하루를 48시간으로 늘리기 (나만)', b: '나이 먹는 속도 절반으로 줄이기' },
      { cat: 'imagine', a: '세계 어디든 순간이동 (하루 1회)', b: '시간을 5분 되감기 (하루 1회)' },
      { cat: 'imagine', a: '요리하면 무조건 맛있어지는 손', b: '그림 그리면 무조건 작품이 되는 손' },
      { cat: 'imagine', a: '영화 속 세계에 하루 들어감', b: '게임 속 세계에 하루 들어감' },
      { cat: 'imagine', a: '미래의 기술로 가득한 집', b: '마법으로 가득한 집' },
      { cat: 'imagine', a: '한 달간 말을 할 수 없지만 텔레파시 가능', b: '한 달간 소리를 들을 수 없지만 감정을 느낌' },
    ];

    const CAT_LABELS = {
      lifestyle: '라이프스타일',
      values: '가치관',
      fun: '재미/유머',
      deep: '심층 탐구',
      relationship: '관계',
      imagine: '상상',
    };

    // ══════════════════════════════════════════════════════════════
    // STATE  (oral discussion mode — no vote counting needed)
    // ══════════════════════════════════════════════════════════════
    var state = {
      playerCount: 4,
      currentCat: 'all',
      queue: [],
      position: 0,
      selections: [],  // 'A' | 'B' | null per queue index
    };

    // ══════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════
    document.addEventListener('DOMContentLoaded', function () {
      updateCounts();
      renderPlayerCount();
    });

    function updateCounts() {
      var all = QUESTIONS.length;
      document.getElementById('count-all').textContent = all + '개 질문';
      ['lifestyle', 'values', 'fun', 'deep', 'relationship', 'imagine'].forEach(function (cat) {
        var n = QUESTIONS.filter(function (q) { return q.cat === cat; }).length;
        document.getElementById('count-' + cat).textContent = n + '개';
      });
    }

    // ══════════════════════════════════════════════════════════════
    // PLAYER COUNT
    // ══════════════════════════════════════════════════════════════
    function renderPlayerCount() {
      document.getElementById('player-count-display').textContent = state.playerCount;
      document.getElementById('btn-player-minus').disabled = state.playerCount <= 2;
      document.getElementById('btn-player-plus').disabled = state.playerCount >= 10;
    }

    function changePlayerCount(delta) {
      var next = state.playerCount + delta;
      if (next < 2 || next > 10) return;
      state.playerCount = next;
      renderPlayerCount();
    }

    // ══════════════════════════════════════════════════════════════
    // SHUFFLE UTILITY
    // Fisher-Yates (Knuth) shuffle — returns a new shuffled array,
    // leaving the original array untouched.
    // ══════════════════════════════════════════════════════════════
    function shuffle(arr) {
      var result = arr.slice(); // shallow copy — never mutate source
      for (var i = result.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = result[i];
        result[i] = result[j];
        result[j] = tmp;
      }
      return result;
    }

    // ══════════════════════════════════════════════════════════════
    // FILTER TABS — sync active tab visually
    // ══════════════════════════════════════════════════════════════
    function setActiveFilterTab(cat) {
      document.querySelectorAll('.filter-tab').forEach(function (btn) {
        btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
      });
      // Scroll active tab into view on small screens
      var active = document.querySelector('.filter-tab.active');
      if (active) {
        active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }

    // Called when a filter tab is tapped while a game is in progress
    function changeFilter(cat) {
      if (cat === state.currentCat) return; // already on this category
      startGame(cat);
    }

    // ══════════════════════════════════════════════════════════════
    // GAME FLOW
    // ══════════════════════════════════════════════════════════════
    function startGame(cat) {
      state.currentCat = cat;
      var pool = cat === 'all'
        ? QUESTIONS.slice()
        : QUESTIONS.filter(function (q) { return q.cat === cat; });

      // Shuffle the pool, then cap to 10 questions per round.
      // Each call to startGame / restartGame produces a fresh random order.
      state.queue = shuffle(pool).slice(0, Math.min(10, pool.length));
      state.position = 0;
      state.selections = new Array(state.queue.length).fill(null);
      setActiveFilterTab(cat);
      showScreen('screen-game');
      renderQuestion();
    }

    function renderQuestion() {
      var q = state.queue[state.position];
      if (!q) { showScreen('screen-end'); return; }

      // Update category badge and option texts
      document.getElementById('question-cat-badge').textContent = CAT_LABELS[q.cat] || q.cat;
      document.getElementById('option-a-text').textContent = q.a;
      document.getElementById('option-b-text').textContent = q.b;

      // Restore selection state saved for this question position
      var saved = state.selections[state.position];
      var btnA = document.getElementById('option-a-btn');
      var btnB = document.getElementById('option-b-btn');
      btnA.classList.remove('selected', 'dimmed');
      btnB.classList.remove('selected', 'dimmed');
      if (saved === 'A') {
        btnA.classList.add('selected');
        btnB.classList.add('dimmed');
      } else if (saved === 'B') {
        btnB.classList.add('selected');
        btnA.classList.add('dimmed');
      }

      // Show prev button only when not on the first question
      document.getElementById('btn-prev').hidden = (state.position === 0);

      // Update next-button label
      document.getElementById('btn-next').textContent =
        state.position < state.queue.length - 1 ? '다음 질문 →' : '결과 화면 →';

      // Animate card in
      var card = document.getElementById('question-card');
      card.style.animation = 'none';
      void card.offsetWidth; // trigger reflow
      card.style.animation = '';

      // Update progress bar
      var pct = (state.position / state.queue.length) * 100;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent =
        (state.position + 1) + ' / ' + state.queue.length;
    }

    // Oral discussion: tap to highlight your personal pick.
    // Tapping the same option again toggles it off (deselect).
    function selectOption(opt) {
      var btnA = document.getElementById('option-a-btn');
      var btnB = document.getElementById('option-b-btn');

      var alreadySelected = (opt === 'A')
        ? btnA.classList.contains('selected')
        : btnB.classList.contains('selected');

      // Reset both first
      btnA.classList.remove('selected', 'dimmed');
      btnB.classList.remove('selected', 'dimmed');

      if (!alreadySelected) {
        // Highlight chosen; dim the other
        if (opt === 'A') {
          btnA.classList.add('selected');
          btnB.classList.add('dimmed');
        } else {
          btnB.classList.add('selected');
          btnA.classList.add('dimmed');
        }
        state.selections[state.position] = opt;
      } else {
        // Same option tapped again → deselect
        state.selections[state.position] = null;
      }
    }

    function nextQuestion() {
      state.position += 1;
      if (state.position >= state.queue.length) {
        showScreen('screen-end');
      } else {
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (state.position <= 0) return;
      state.position -= 1;
      renderQuestion();
    }

    // ══════════════════════════════════════════════════════════════
    // SHUFFLE QUEUE
    // Re-shuffles questions from current position onwards so the
    // coming order changes. The current card is immediately replaced
    // by the new first item from the reshuffled pool.
    // ══════════════════════════════════════════════════════════════
    function shuffleQueue() {
      var btn = document.getElementById('btn-shuffle');

      // Nothing meaningful to shuffle with only 1 remaining
      var remaining = state.queue.length - state.position;
      if (remaining <= 1) return;

      // Keep already-seen questions; reshuffle the rest
      var before    = state.queue.slice(0, state.position);
      var toShuffle = state.queue.slice(state.position);
      var shuffled  = shuffle(toShuffle);

      // Ensure the new first card differs from the current one
      // so the user sees an immediate visible change
      if (shuffled.length > 1 && shuffled[0] === state.queue[state.position]) {
        var swapIdx = Math.floor(Math.random() * (shuffled.length - 1)) + 1;
        var tmp = shuffled[0];
        shuffled[0] = shuffled[swapIdx];
        shuffled[swapIdx] = tmp;
      }

      state.queue = before.concat(shuffled);
      renderQuestion();

      // Trigger the spin animation on the icon
      btn.classList.remove('shuffling');
      void btn.offsetWidth; // force reflow to restart the animation
      btn.classList.add('shuffling');
      btn.addEventListener('animationend', function onEnd() {
        btn.classList.remove('shuffling');
        btn.removeEventListener('animationend', onEnd);
      });
    }

    function restartGame() {
      startGame(state.currentCat);
    }

    function showCategories() {
      showScreen('screen-categories');
    }

    // ══════════════════════════════════════════════════════════════
    // SCREEN HELPERS
    // ══════════════════════════════════════════════════════════════
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      document.getElementById(id).classList.add('active');
      window.scrollTo(0, 0);
    }
  </script>
  <script src="shared/transitions.js"></script>
