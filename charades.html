<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>몸으로 말해요 — 모임 게임 모음집</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f8f8f6;
      --gray-50: #f5f5f3;
      --gray-100: #ebebea;
      --gray-200: #d8d8d6;
      --gray-400: #a0a09e;
      --gray-600: #6b6b69;
      --gray-800: #2d2d2b;
      --black: #1a1a18;

      --accent: #06b6d4;        /* cyan — charades theme */
      --accent-rgb: 6, 182, 212;
      --accent-light: #ecfeff;

      --correct: #10b981;       /* green for correct answers */
      --correct-rgb: 16, 185, 129;
      --pass: #f97316;          /* orange for passed words */
      --pass-rgb: 249, 115, 22;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);

      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --transition: 300ms cubic-bezier(.4, 0, .2, 1);

      --bg: var(--off-white);
      --surface: var(--white);
      --text: var(--black);
      --text-secondary: var(--gray-600);
      --border: var(--gray-100);
    }

    /* ─── Dark Mode ─────────────────────────────────────────────────── */
    html[data-theme="dark"] {
      --white: #1e1e22;
      --off-white: #121214;
      --gray-50: #252528;
      --gray-100: #2e2e32;
      --gray-200: #3e3e42;
      --gray-400: #7a7a7e;
      --gray-600: #a5a5a9;
      --gray-800: #dcdce0;
      --black: #f0f0f2;

      --bg: #121214;
      --surface: #1e1e22;
      --text: #f0f0f2;
      --text-secondary: #a5a5a9;
      --border: #2e2e32;

      --accent-light: #0c2126;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.25);
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Topbar ────────────────────────────────────────────────────── */
    .game-topbar {
      position: sticky;
      top: 0;
      height: 56px;
      background: rgba(255,255,255,.9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
      flex-shrink: 0;
    }
    [data-theme="dark"] .game-topbar {
      background: rgba(18,18,20,.92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .btn-back {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      transition: var(--transition);
      flex-shrink: 0;
    }
    .btn-back:hover { background: var(--gray-100); transform: scale(1.08); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .topbar-title .emoji { font-size: 18px; }

    .btn-theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--surface);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .btn-theme-toggle:hover { background: var(--gray-100); transform: scale(1.08); }

    /* ─── Main container ─────────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 540px;
      width: 100%;
      margin: 0 auto;
    }

    /* ─── Screen management ──────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ══════════════════════════════════════════════════════════════════
       SCREEN 1: SETUP (Category + Timer selection)
    ══════════════════════════════════════════════════════════════════ */
    #screen-setup {
      padding: 24px 20px 40px;
      align-items: flex-start;
      gap: 28px;
    }

    /* Setup header */
    .setup-header {
      width: 100%;
      text-align: center;
    }
    .setup-hero-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
    }
    .setup-title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -.04em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .setup-desc {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    /* Section label */
    .setup-section-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    /* Category grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      width: 100%;
    }
    @media (min-width: 400px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .category-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px 12px;
      cursor: pointer;
      transition: border-color var(--transition), box-shadow var(--transition),
                  transform var(--transition), background var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }
    .category-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .category-card:active { transform: translateY(0) scale(.97); }
    .category-card.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb),.15), var(--shadow-sm);
    }

    .category-icon { font-size: 26px; line-height: 1; }
    .category-name {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--text);
    }
    .category-count {
      font-size: 11px;
      color: var(--text-secondary);
    }

    /* Checkmark on selected card */
    .category-check {
      position: absolute;
      top: 6px; right: 6px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transform: scale(0);
      transition: opacity 180ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1);
    }
    .category-card.selected .category-check { opacity: 1; transform: scale(1); }

    /* Timer selection pills */
    .timer-options {
      display: flex;
      gap: 8px;
      width: 100%;
    }
    .timer-btn {
      flex: 1;
      padding: 12px 8px;
      border-radius: var(--radius-md);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      text-align: center;
    }
    .timer-btn:hover { border-color: var(--accent); }
    .timer-btn.selected {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(var(--accent-rgb),.35);
    }
    .timer-btn:active { transform: scale(.97); }

    /* Player count row */
    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      width: 100%;
    }
    .player-row .label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      flex: 1;
    }
    .player-stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .btn-step {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--gray-200);
      background: var(--surface);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex; align-items: center; justify-content: center;
      color: var(--text);
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-step:hover { background: var(--gray-50); }
    .btn-step:disabled { opacity: .35; cursor: not-allowed; }
    .player-count-display {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      min-width: 24px;
      text-align: center;
    }

    /* Start button */
    .btn-start {
      width: 100%;
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      font-family: var(--font);
      letter-spacing: -.01em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(var(--accent-rgb),.4);
    }
    .btn-start:hover { opacity: .9; box-shadow: 0 6px 24px rgba(var(--accent-rgb),.5); }
    .btn-start:active { transform: scale(.98); }
    .btn-start:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }

    /* ══════════════════════════════════════════════════════════════════
       SCREEN 2: GAMEPLAY
    ══════════════════════════════════════════════════════════════════ */
    #screen-game {
      padding: 20px 20px 32px;
      align-items: stretch;
      gap: 16px;
    }

    /* Game top bar: score + round info */
    .game-status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .status-score {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      background: rgba(var(--correct-rgb),.12);
      color: var(--correct);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 700;
    }
    .score-badge .score-num {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .status-category {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-secondary);
    }

    /* Actor hint banner */
    .actor-hint {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(var(--accent-rgb),.08);
      border: 1px solid rgba(var(--accent-rgb),.18);
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-align: center;
    }

    /* Word display card */
    .word-card {
      background: var(--surface);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 40px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: cardIn 300ms cubic-bezier(.4, 0, .2, 1);
      position: relative;
      overflow: hidden;
    }
    /* Decorative gradient blobs */
    .word-card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb),.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .word-card::after {
      content: '';
      position: absolute;
      bottom: -30px; left: -30px;
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(var(--accent-rgb),.08) 0%, transparent 70%);
      pointer-events: none;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(.94) translateY(12px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .word-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }
    .word-text {
      font-size: clamp(32px, 9vw, 52px);
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1.15;
      color: var(--text);
      word-break: keep-all;
      position: relative;
      z-index: 1;
    }

    /* Circular countdown timer */
    .timer-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .timer-circle-wrap {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .timer-svg {
      transform: rotate(-90deg);
      width: 120px;
      height: 120px;
    }

    .timer-track {
      fill: none;
      stroke: var(--gray-100);
      stroke-width: 8;
    }
    .timer-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke var(--transition);
      /* circumference = 2 * PI * 50 ≈ 314.16 */
      stroke-dasharray: 314.16;
      stroke-dashoffset: 0;
    }
    /* Warning colors as time runs low */
    .timer-progress.warn  { stroke: var(--pass); }
    .timer-progress.danger { stroke: #ef4444; }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .timer-num {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      color: var(--text);
      transition: color var(--transition);
      font-feature-settings: "tnum";
    }
    .timer-num.warn   { color: var(--pass); }
    .timer-num.danger { color: #ef4444; }

    /* Pulse animation when time is low */
    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.06); }
    }
    .timer-num.pulse { animation: timerPulse 600ms ease-in-out infinite; }

    /* Action buttons: 정답 / 패스 */
    .action-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .btn-correct {
      padding: 18px 12px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--correct);
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      font-family: var(--font);
      letter-spacing: -.02em;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition),
                  box-shadow var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(var(--correct-rgb),.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-correct:hover { opacity: .9; box-shadow: 0 6px 20px rgba(var(--correct-rgb),.5); }
    .btn-correct:active { transform: scale(.96); }

    .btn-pass {
      padding: 18px 12px;
      border-radius: var(--radius-lg);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text-secondary);
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font);
      letter-spacing: -.02em;
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-pass:hover {
      border-color: var(--pass);
      color: var(--pass);
      background: rgba(var(--pass-rgb),.06);
    }
    .btn-pass:active { transform: scale(.96); }

    /* Word counter progress row */
    .word-progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .word-progress-bar {
      flex: 1;
      height: 3px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }
    .word-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 400ms cubic-bezier(.4, 0, .2, 1);
    }
    .word-progress-label {
      font-size: 11px;
      color: var(--text-secondary);
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ══════════════════════════════════════════════════════════════════
       SCREEN 3: RESULTS
    ══════════════════════════════════════════════════════════════════ */
    #screen-results {
      padding: 32px 20px 48px;
      align-items: center;
    }

    .results-header {
      text-align: center;
      margin-bottom: 28px;
    }
    .results-icon { font-size: 64px; display: block; margin-bottom: 12px; }
    .results-title {
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -.04em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .results-subtitle {
      font-size: 15px;
      color: var(--text-secondary);
    }

    /* Score summary cards */
    .results-scores {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-bottom: 24px;
    }
    .score-card {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 12px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .score-card.correct-card { border-color: rgba(var(--correct-rgb),.35); }
    .score-card.pass-card    { border-color: rgba(var(--pass-rgb),.35); }
    .score-card-icon { font-size: 24px; margin-bottom: 6px; }
    .score-card-num {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -.04em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .correct-card .score-card-num { color: var(--correct); }
    .pass-card    .score-card-num { color: var(--pass); }
    .score-card-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Word list */
    .results-list-section {
      width: 100%;
      margin-bottom: 28px;
    }
    .results-list-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }
    .results-word-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .results-word-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: var(--radius-md);
      border: 1px solid var(--border);
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .result-tag {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .result-tag.correct {
      background: rgba(var(--correct-rgb),.12);
      color: var(--correct);
    }
    .result-tag.pass {
      background: rgba(var(--pass-rgb),.12);
      color: var(--pass);
    }

    /* Results action buttons */
    .results-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 360px;
    }
    .btn-primary {
      width: 100%;
      padding: 15px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 16px rgba(var(--accent-rgb),.35);
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }

    .btn-secondary {
      width: 100%;
      padding: 15px 20px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-secondary:active { transform: scale(.98); }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (min-width: 480px) {
      #screen-setup  { padding-left: 28px; padding-right: 28px; }

  </style>

<!-- ─── Topbar ──────────────────────────────────────────────────────── -->
<header class="game-topbar">

<!-- ─── Main ────────────────────────────────────────────────────────── -->
<main class="main">

  <!-- ══ Screen 1: Setup ════════════════════════════════════════════ -->
  <section id="screen-setup" class="screen active">

    <div class="setup-header">
      <span class="setup-hero-icon">🕺</span>

    <div style="width:100%">

  <!-- ══ Screen 2: Gameplay ═════════════════════════════════════════ -->
  <section id="screen-game" class="screen">

    <!-- Status row -->

    <!-- Action buttons -->

      <button class="btn-secondary" onclick="changeCategory()">🗂 주제 바꾸기</button>
      <button class="btn-secondary" onclick="goHome()">← 메인으로</button>

</main>

<script>
  // ──────────────────────────────────────────────────────────────────

  var CATEGORIES = [

        '요리사', '발레리나', '프로게이머', '외과의사', '경찰관',
        '유튜버', '패션 디자이너', '비행기 파일럿', '악기 연주자', '우주비행사',

      words: [
        '떡볶이', '짜장면', '삼겹살', '마카롱', '스파게티',
        '초밥', '핫도그', '솜사탕', '탕후루', '닭볶음탕',
        '아이스크림 콘', '도넛', '피자', '라면', '치킨',
        '순대', '팥빙수', '와플', '부대찌개'
      ]
    },
    {
      id: 'actions',
      name: '행동',
      icon: '🏃',
      words: [
        '셀카 찍기', '눈사람 만들기', '노래방에서 열창하기', '줄다리기', '스키 타기',
        '기타 치기', '설거지하기', '아기 재우기', '낚시하기', '자전거 타기',
        '파리 잡기', '지퍼 올리기', '강아지 산책시키기', '창문 닦기', '코골이',
        '다리 꼬고 앉기', '망원경으로 보기', '모자 날아가는 것 잡기', '택시 잡기'
      ]
    },
    {
      id: 'objects',
      name: '사물',
      icon: '📦',
      words: [
        '세탁기', '엘리베이터', '선풍기', '자판기', '에스컬레이터',
        '재봉틀', '믹서기', '드럼', '트램폴린', '줄넘기',
        '망원경', '청소기', '전자레인지', '아코디언', '시소',
        '풍선', '손풍금', '우산', '주사기'
      ]
    }
  ];

  // ──────────────────────────────────────────────────────────────────
  // STATE
  // ──────────────────────────────────────────────────────────────────
  var state = {
    selectedCategoryId: 'animals',
    timerSeconds: 60,
    playerCount: 6,

    // Runtime
    wordQueue: [],
    wordIndex: 0,
    score: 0,
    passCount: 0,
    timeLeft: 60,
    timerInterval: null,
    playedWords: [],   // { word, result: 'correct'|'pass' }
    gameActive: false
  };

  // ──────────────────────────────────────────────────────────────────
  // DARK MODE
  // ──────────────────────────────────────────────────────────────────
  function updateThemeIcon() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var btn = document.getElementById('btnTheme');
    if (!btn) return;
    btn.textContent = isDark ? '☀️' : '🌙';
    btn.title = isDark ? '라이트 모드로 전환' : '다크 모드로 전환';
    btn.setAttribute('aria-label', isDark ? '라이트 모드로 전환' : '다크 모드로 전환');
  }

  function toggleTheme() {
    var current = document.documentElement.getAttribute('data-theme');
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    updateThemeIcon();
  }

  (function initTheme() {
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || saved === 'light') {
      document.documentElement.setAttribute('data-theme', saved);
    } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
    updateThemeIcon();
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
      if (!localStorage.getItem('theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
        updateThemeIcon();
      }
    });
  })();

  // ──────────────────────────────────────────────────────────────────
  // SCREEN MANAGEMENT
  // ──────────────────────────────────────────────────────────────────
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(function (s) {
      s.classList.remove('active');
    });
    document.getElementById(id).classList.add('active');
  }

  // ──────────────────────────────────────────────────────────────────
  // SETUP SCREEN — render category cards
  // ──────────────────────────────────────────────────────────────────
  function renderCategoryGrid() {
    var grid = document.getElementById('categoryGrid');
    grid.innerHTML = '';
    CATEGORIES.forEach(function (cat) {
      var card = document.createElement('button');
      card.className = 'category-card' + (cat.id === state.selectedCategoryId ? ' selected' : '');
      card.setAttribute('data-id', cat.id);
      card.setAttribute('aria-pressed', cat.id === state.selectedCategoryId ? 'true' : 'false');
      card.innerHTML =
        '<div class="category-icon">' + cat.icon + '</div>' +
        '<div class="category-name">' + cat.name + '</div>' +
        '<div class="category-count">' + cat.words.length + '개</div>' +
        '<div class="category-check">✓</div>';
      card.addEventListener('click', function () { selectCategory(cat.id); });
      grid.appendChild(card);
    });
  }

  function selectCategory(id) {
    state.selectedCategoryId = id;
    document.querySelectorAll('.category-card').forEach(function (c) {
      var isSelected = c.getAttribute('data-id') === id;
      c.classList.toggle('selected', isSelected);
      c.setAttribute('aria-pressed', isSelected ? 'true' : 'false');
    });
  }

  function selectTimer(secs) {
    state.timerSeconds = secs;
    document.querySelectorAll('.timer-btn').forEach(function (btn) {
      btn.classList.toggle('selected', parseInt(btn.getAttribute('data-seconds'), 10) === secs);
    });
  }

  function changePlayerCount(delta) {
    var next = state.playerCount + delta;
    if (next < 4 || next > 10) return;
    state.playerCount = next;
    document.getElementById('playerCountDisplay').textContent = next;
    document.getElementById('btnPlayerMinus').disabled = next <= 4;
    document.getElementById('btnPlayerPlus').disabled  = next >= 10;
  }

  // ──────────────────────────────────────────────────────────────────
  // FISHER-YATES SHUFFLE — unbiased in-place random shuffle
  // ──────────────────────────────────────────────────────────────────
  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // ──────────────────────────────────────────────────────────────────
  // WEB AUDIO — short beep alarm (no external files)
  // ──────────────────────────────────────────────────────────────────
  function playBeep(frequency, duration, volume) {
    try {
      var ctx = new (window.AudioContext || window.webkitAudioContext)();
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = frequency || 880;
      gain.gain.setValueAtTime(volume || 0.25, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + (duration || 0.15));
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + (duration || 0.15));
    } catch (e) { /* AudioContext not available — silently skip */ }
  }

  function playCorrectSound() {
    playBeep(880, 0.08, 0.2);
    setTimeout(function () { playBeep(1320, 0.1, 0.2); }, 80);
  }

  function playTimerEndSound() {
    // Three descending beeps
    playBeep(660, 0.15, 0.3);
    setTimeout(function () { playBeep(520, 0.15, 0.3); }, 180);
    setTimeout(function () { playBeep(440, 0.25, 0.35); }, 360);
  }

  function playTickSound() {
    playBeep(440, 0.04, 0.1);
  }

  // ──────────────────────────────────────────────────────────────────
  // TIMER ARC  (SVG circumference = 2πr = 2×π×50 ≈ 314.16)
  // ──────────────────────────────────────────────────────────────────
  var CIRCUMFERENCE = 2 * Math.PI * 50; // ≈ 314.16

  function updateTimerArc(secondsLeft, totalSeconds) {
    var arc  = document.getElementById('timerArc');
    var num  = document.getElementById('timerNum');
    var ratio = secondsLeft / totalSeconds;
    var offset = CIRCUMFERENCE * (1 - ratio);
    arc.style.strokeDashoffset = offset;

    // Color & pulse states
    var warnThreshold   = totalSeconds * 0.33;
    var dangerThreshold = totalSeconds * 0.15;

    if (secondsLeft <= dangerThreshold) {
      arc.className = 'timer-progress danger';
      num.className = 'timer-num danger pulse';
    } else if (secondsLeft <= warnThreshold) {
      arc.className = 'timer-progress warn';
      num.className = 'timer-num warn';
    } else {
      arc.className = 'timer-progress';
      num.className = 'timer-num';
    }

    num.textContent = secondsLeft;
  }

  // ──────────────────────────────────────────────────────────────────
  // GAME START
  // ──────────────────────────────────────────────────────────────────
  function startGame() {
    var cat = CATEGORIES.find(function (c) { return c.id === state.selectedCategoryId; });
    if (!cat) return;

    // Reset state
    state.wordQueue   = shuffle(cat.words);
    state.wordIndex   = 0;
    state.score       = 0;
    state.passCount   = 0;
    state.timeLeft    = state.timerSeconds;
    state.playedWords = [];
    state.gameActive  = true;

    // Update game screen labels
    document.getElementById('gameCategory').textContent = cat.icon + ' ' + cat.name;
    document.getElementById('liveScore').textContent = '0';

    showScreen('screen-game');
    renderCurrentWord();
    startTimer();
  }

  // ──────────────────────────────────────────────────────────────────
  // WORD RENDERING
  // ──────────────────────────────────────────────────────────────────
  function renderCurrentWord() {
    var word = state.wordQueue[state.wordIndex] || '—';
    var wordEl = document.getElementById('wordText');
    wordEl.textContent = word;

    // Animate card
    var card = document.getElementById('wordCard');
    card.style.animation = 'none';
    void card.offsetWidth; // force reflow
    card.style.animation = 'cardIn 300ms cubic-bezier(.4, 0, .2, 1)';

    // Update progress bar
    var total  = state.wordQueue.length;
    var done   = state.wordIndex;
    var pct    = total > 0 ? (done / total * 100) : 0;
    document.getElementById('wordProgressFill').style.width = pct + '%';
    document.getElementById('wordProgressLabel').textContent = done + ' / ' + total;
  }

  // ──────────────────────────────────────────────────────────────────
  // TIMER
  // ──────────────────────────────────────────────────────────────────
  function startTimer() {
    updateTimerArc(state.timeLeft, state.timerSeconds);
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(function () {
      state.timeLeft -= 1;
      updateTimerArc(state.timeLeft, state.timerSeconds);

      // Tick sound in last 5 seconds
      if (state.timeLeft > 0 && state.timeLeft <= 5) {
        playTickSound();
      }

      if (state.timeLeft <= 0) {
        clearInterval(state.timerInterval);
        state.gameActive = false;
        playTimerEndSound();
        setTimeout(showResults, 600);
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(state.timerInterval);
  }

  // ──────────────────────────────────────────────────────────────────
  // GAMEPLAY ACTIONS
  // ──────────────────────────────────────────────────────────────────
  function handleCorrect() {
    if (!state.gameActive) return;
    var word = state.wordQueue[state.wordIndex];
    if (!word) return;

    state.score += 1;
    state.playedWords.push({ word: word, result: 'correct' });
    state.wordIndex += 1;

    document.getElementById('liveScore').textContent = state.score;
    playCorrectSound();

    if (state.wordIndex >= state.wordQueue.length) {
      // Ran out of words — cycle back with a reshuffle
      state.wordQueue = state.wordQueue.concat(shuffle(CATEGORIES.find(function (c) {
        return c.id === state.selectedCategoryId;
      }).words));
    }
    renderCurrentWord();
  }

  function handlePass() {
    if (!state.gameActive) return;
    var word = state.wordQueue[state.wordIndex];
    if (!word) return;

    state.passCount += 1;
    state.playedWords.push({ word: word, result: 'pass' });
    state.wordIndex += 1;

    if (state.wordIndex >= state.wordQueue.length) {
      state.wordQueue = state.wordQueue.concat(shuffle(CATEGORIES.find(function (c) {
        return c.id === state.selectedCategoryId;
      }).words));
    }
    renderCurrentWord();
  }

  // ──────────────────────────────────────────────────────────────────
  // RESULTS SCREEN
  // ──────────────────────────────────────────────────────────────────
  function showResults() {
    stopTimer();
    state.gameActive = false;

    document.getElementById('finalCorrect').textContent = state.score;
    document.getElementById('finalPass').textContent    = state.passCount;

    // Pick emoji and subtitle based on score
    var icon, subtitle;
    if (state.score >= 10) {
      icon = '🏆'; subtitle = '완벽한 팀워크예요!';
    } else if (state.score >= 6) {
      icon = '🎉'; subtitle = '훌륭해요! 잘 맞혔어요!';
    } else if (state.score >= 3) {
      icon = '👏'; subtitle = '다음엔 더 잘할 수 있어요!';
    } else {
      icon = '😅'; subtitle = '몸이 굳었나요? 다시 도전!';
    }
    document.getElementById('resultsIcon').textContent    = icon;
    document.getElementById('resultsTitle').textContent   = state.score + '점 획득!';
    document.getElementById('resultsSubtitle').textContent = subtitle;

    // Word list
    var listEl = document.getElementById('resultsWordList');
    listEl.innerHTML = '';
    state.playedWords.forEach(function (item) {
      var div = document.createElement('div');
      div.className = 'results-word-item';
      div.innerHTML =
        '<span class="result-tag ' + item.result + '">' +
          (item.result === 'correct' ? '정답' : '패스') +
        '</span>' +
        '<span>' + item.word + '</span>';
      listEl.appendChild(div);
    });

    showScreen('screen-results');
  }

  // ──────────────────────────────────────────────────────────────────
  // RESULTS ACTIONS
  // ──────────────────────────────────────────────────────────────────
  function playAgain() {
    // Same category, same timer — just restart
    startGame();
  }

  function changeCategory() {
    stopTimer();
    showScreen('screen-setup');
    renderCategoryGrid();
  }

  function goHome() {
    stopTimer();
    // Use transitions.js pattern — navigate to index
    window.location.href = 'index.html';
  }

  // ──────────────────────────────────────────────────────────────────
  // INIT
  // ──────────────────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function () {
    renderCategoryGrid();
    // Init player count display
    document.getElementById('playerCountDisplay').textContent = state.playerCount;
    document.getElementById('btnPlayerMinus').disabled = state.playerCount <= 4;
    document.getElementById('btnPlayerPlus').disabled  = state.playerCount >= 10;
    // Init timer arc to full
    updateTimerArc(state.timerSeconds, state.timerSeconds);
  });
</script>

</body>
