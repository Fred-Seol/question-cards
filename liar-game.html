<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라이어 게임 — 모임 게임 모음집</title>
  <link rel="stylesheet" href="shared/transitions.css" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --off-white: #f8f8f6;
      --gray-50: #f5f5f3;
      --gray-100: #ebebea;
      --gray-200: #d8d8d6;
      --gray-400: #a0a09e;
      --gray-600: #6b6b69;
      --gray-800: #2d2d2b;
      --black: #1a1a18;

      --accent: #06b6d4;
      --accent-rgb: 6, 182, 212;
      --accent-light: #ecfeff;

      --liar-color: #f43f5e;
      --liar-rgb: 244, 63, 94;
      --citizen-color: #06b6d4;
      --citizen-rgb: 6, 182, 212;

      --radius-sm: 8px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);

      --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --transition: 300ms cubic-bezier(.4, 0, .2, 1);
    }

    /* ─── Dark Mode ─────────────────────────────────────────────────── */
    html[data-theme="dark"] {
      --white: #1e1e22;
      --off-white: #121214;
      --gray-50: #252528;
      --gray-100: #2e2e32;
      --gray-200: #3e3e42;
      --gray-400: #7a7a7e;
      --gray-600: #a5a5a9;
      --gray-800: #dcdce0;
      --black: #f0f0f2;

      --accent-light: #0a2430;

      --shadow-sm: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.2);
      --shadow-md: 0 4px 16px rgba(0,0,0,.3), 0 2px 6px rgba(0,0,0,.2);
      --shadow-lg: 0 12px 40px rgba(0,0,0,.4), 0 4px 12px rgba(0,0,0,.25);
    }

    html { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--off-white);
      color: var(--black);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    /* ─── Topbar ────────────────────────────────────────────────────── */
    .game-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: rgba(255, 255, 255, .9);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--gray-100);
      z-index: 100;
      transition: background var(--transition), border-color var(--transition);
    }

    [data-theme="dark"] .game-topbar {
      background: rgba(18, 18, 20, .92);
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: transparent;
      cursor: pointer;
      font-size: 18px;
      color: var(--gray-600);
      transition: background var(--transition), border-color var(--transition);
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-back:hover { background: var(--gray-50); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -.02em;
      color: var(--black);
    }
    .topbar-title .emoji { margin-right: 4px; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── Theme Toggle ──────────────────────────────────────────────── */
    .btn-theme-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      background: var(--white);
      cursor: pointer;
      font-size: 16px;
      transition: background var(--transition), border-color var(--transition);
      color: var(--gray-600);
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-theme-toggle:hover { background: var(--gray-50); border-color: var(--gray-400); }

    /* ─── Main Layout ───────────────────────────────────────────────── */
    .main {
      padding-top: 56px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── Screen management ─────────────────────────────────────────── */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    /* ─── Common Layout Helpers ─────────────────────────────────────── */
    .screen-inner {
      padding: 24px 20px 40px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .screen-hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .hero-icon {
      font-size: 52px;
      display: block;
      margin-bottom: 12px;
      line-height: 1;
    }

    .screen-title {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
      margin-bottom: 6px;
    }

    .screen-desc {
      font-size: 14px;
      color: var(--gray-600);
      word-break: keep-all;
      line-height: 1.7;
    }

    /* ─── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-md);
      padding: 24px;
      transition: background var(--transition), box-shadow var(--transition);
    }

    /* ─── Buttons ───────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%;
      padding: 16px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      letter-spacing: -.01em;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-secondary {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-secondary:hover { border-color: var(--gray-400); background: var(--gray-50); }
    .btn-secondary:active { transform: scale(.98); }

    .btn-danger {
      width: 100%;
      padding: 14px 20px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--liar-color);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .btn-danger:hover { opacity: .9; }
    .btn-danger:active { transform: scale(.98); }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: auto;
      padding-top: 24px;
    }

    .btn-row-h {
      display: flex;
      gap: 10px;
    }

    .btn-row-h .btn-primary,
    .btn-row-h .btn-secondary,
    .btn-row-h .btn-danger {
      flex: 1;
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 1: 설정
    ══════════════════════════════════════════════════════════════ */
    .section-label {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .03em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* Player count selector */
    .player-count-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 24px;
    }

    .player-count-label {
      font-size: 15px;
      font-weight: 600;
      color: var(--black);
    }

    .player-count-controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .count-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      font-weight: 400;
    }
    .count-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .count-btn:active { transform: scale(.93); }
    .count-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; }

    .count-value {
      font-size: 24px;
      font-weight: 800;
      color: var(--black);
      min-width: 32px;
      text-align: center;
      letter-spacing: -.03em;
    }

    /* Category grid */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .cat-card {
      background: var(--white);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-md);
      padding: 16px 14px;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .cat-card:hover { box-shadow: var(--shadow-sm); transform: translateY(-1px); }
    .cat-card:active { transform: translateY(0); }

    .cat-card.selected {
      border-color: var(--accent);
      background: var(--accent-light);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), .15), var(--shadow-sm);
    }

    [data-theme="dark"] .cat-card.selected {
      background: rgba(var(--accent-rgb), .12);
    }

    .cat-card .cat-check {
      position: absolute;
      top: 8px; right: 8px;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: opacity 200ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1);
    }
    .cat-card.selected .cat-check {
      opacity: 1;
      transform: scale(1);
    }

    .cat-icon { font-size: 26px; line-height: 1; }
    .cat-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      letter-spacing: -.01em;
    }
    .cat-count {
      font-size: 11px;
      color: var(--gray-400);
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 2: 역할 배정
    ══════════════════════════════════════════════════════════════ */
    .role-progress {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .role-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }

    .role-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 400ms cubic-bezier(.4, 0, .2, 1);
    }

    .role-progress-label {
      font-size: 12px;
      color: var(--gray-400);
      white-space: nowrap;
    }

    .role-reveal-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      min-height: 300px;
    }

    /* The flip card */
    .flip-card {
      width: 100%;
      max-width: 320px;
      perspective: 800px;
    }

    .flip-card-inner {
      position: relative;
      width: 100%;
      padding-bottom: 62%;
      transform-style: preserve-3d;
      transition: transform 500ms cubic-bezier(.4, 0, .2, 1);
    }

    .flip-card.revealed .flip-card-inner {
      transform: rotateY(180deg);
    }

    .flip-card-front,
    .flip-card-back {
      position: absolute;
      inset: 0;
      border-radius: var(--radius-xl);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .flip-card-front {
      background: var(--white);
      box-shadow: var(--shadow-lg);
      cursor: pointer;
      border: 2px solid var(--gray-100);
      gap: 12px;
      transition: background var(--transition), box-shadow var(--transition), transform var(--transition);
    }
    .flip-card-front:active { transform: scale(.98); }

    .flip-card-front .tap-hint {
      font-size: 28px;
      line-height: 1;
    }

    .flip-card-front .player-num {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
      color: var(--black);
    }

    .flip-card-front .tap-label {
      font-size: 13px;
      color: var(--gray-400);
      font-weight: 500;
    }

    .flip-card-back {
      background: var(--white);
      box-shadow: var(--shadow-lg);
      transform: rotateY(180deg);
      gap: 10px;
    }

    .flip-card-back.role-citizen {
      border: 3px solid var(--citizen-color);
      background: linear-gradient(135deg, rgba(var(--citizen-rgb), .07) 0%, var(--white) 70%);
    }

    .flip-card-back.role-liar {
      border: 3px solid var(--liar-color);
      background: linear-gradient(135deg, rgba(var(--liar-rgb), .07) 0%, var(--white) 70%);
    }

    .role-icon {
      font-size: 36px;
      line-height: 1;
    }

    .role-name {
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.02em;
    }

    .role-citizen .role-name { color: var(--citizen-color); }
    .role-liar .role-name { color: var(--liar-color); }

    .role-topic-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .role-topic-word {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -.03em;
      color: var(--black);
      margin-top: 2px;
    }

    .role-liar-hint {
      font-size: 13px;
      color: var(--gray-600);
      line-height: 1.5;
      word-break: keep-all;
    }

    .role-confirm-btn {
      width: 100%;
      max-width: 320px;
      padding: 14px;
      border-radius: var(--radius-lg);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity var(--transition), transform var(--transition);
      -webkit-tap-highlight-color: transparent;
      display: none;
    }
    .role-confirm-btn.visible { display: block; }
    .role-confirm-btn:hover { opacity: .9; }
    .role-confirm-btn:active { transform: scale(.98); }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 3: 토론
    ══════════════════════════════════════════════════════════════ */
    .timer-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin: 32px 0;
    }

    .timer-display {
      font-size: 80px;
      font-weight: 900;
      letter-spacing: -.05em;
      color: var(--black);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      transition: color var(--transition);
    }

    .timer-display.warning { color: #f97316; }
    .timer-display.danger { color: var(--liar-color); }

    .timer-ring {
      width: 180px; height: 180px;
      position: relative;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
      width: 100%; height: 100%;
    }

    .timer-ring .ring-bg {
      fill: none;
      stroke: var(--gray-100);
      stroke-width: 8;
    }

    .timer-ring .ring-fill {
      fill: none;
      stroke: var(--accent);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1s linear, stroke var(--transition);
    }

    .timer-ring .ring-fill.warning { stroke: #f97316; }
    .timer-ring .ring-fill.danger { stroke: var(--liar-color); }

    .timer-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .timer-center .timer-display {
      font-size: 44px;
    }

    .timer-center .timer-label {
      font-size: 12px;
      color: var(--gray-400);
      font-weight: 500;
    }

    .timer-preset-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 20px;
    }

    .preset-btn {
      padding: 6px 16px;
      border-radius: 99px;
      border: 1.5px solid var(--gray-200);
      background: var(--white);
      color: var(--gray-600);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
    .preset-btn.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .discussion-hint {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      font-size: 14px;
      color: var(--gray-600);
      text-align: center;
      word-break: keep-all;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .discussion-hint strong {
      color: var(--black);
    }

    .timer-controls {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .timer-controls .btn-primary,
    .timer-controls .btn-secondary {
      flex: 1;
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 4: 투표
    ══════════════════════════════════════════════════════════════ */
    .vote-info {
      background: var(--white);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      font-size: 13px;
      color: var(--gray-600);
      text-align: center;
      margin-bottom: 20px;
      word-break: keep-all;
    }

    .vote-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    .vote-player-btn {
      background: var(--white);
      border: 2px solid var(--gray-100);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      transition: all var(--transition);
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .vote-player-btn:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
    .vote-player-btn:active { transform: scale(.96); }

    .vote-player-btn.voted {
      border-color: var(--liar-color);
      background: rgba(var(--liar-rgb), .06);
      box-shadow: 0 0 0 3px rgba(var(--liar-rgb), .12), var(--shadow-sm);
    }

    .vote-player-icon {
      font-size: 22px;
      line-height: 1;
    }

    .vote-player-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
    }

    .vote-badge {
      position: absolute;
      top: -6px; right: -6px;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--liar-color);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      transition: opacity 200ms ease, transform 200ms cubic-bezier(.34,1.56,.64,1);
    }

    .vote-player-btn.voted .vote-badge {
      opacity: 1;
      transform: scale(1);
    }

    /* ══════════════════════════════════════════════════════════════
       SCREEN 5: 결과
    ══════════════════════════════════════════════════════════════ */
    .result-reveal {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .result-outcome-banner {
      width: 100%;
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: revealBanner 500ms cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes revealBanner {
      from { opacity: 0; transform: scale(.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .result-outcome-banner.success {
      background: linear-gradient(135deg, rgba(var(--citizen-rgb), .15) 0%, rgba(var(--citizen-rgb), .05) 100%);
      border: 2px solid rgba(var(--citizen-rgb), .4);
    }

    .result-outcome-banner.fail {
      background: linear-gradient(135deg, rgba(var(--liar-rgb), .15) 0%, rgba(var(--liar-rgb), .05) 100%);
      border: 2px solid rgba(var(--liar-rgb), .4);
    }

    .result-outcome-icon {
      font-size: 48px;
      line-height: 1;
    }

    .result-outcome-text {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -.03em;
    }

    .result-outcome-banner.success .result-outcome-text { color: var(--citizen-color); }
    .result-outcome-banner.fail .result-outcome-text { color: var(--liar-color); }

    .result-liar-reveal {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideUp 400ms 200ms cubic-bezier(.4, 0, .2, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-liar-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: rgba(var(--liar-rgb), .12);
      border: 2px solid var(--liar-color);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .result-liar-info { flex: 1; }

    .result-liar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--liar-color);
      margin-bottom: 2px;
    }

    .result-liar-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -.02em;
      color: var(--black);
    }

    .result-topic-reveal {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 20px;
      box-shadow: var(--shadow-md);
      text-align: center;
      animation: slideUp 400ms 350ms cubic-bezier(.4, 0, .2, 1) both;
    }

    .result-topic-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--gray-400);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 6px;
    }

    .result-topic-word {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -.04em;
      color: var(--black);
    }

    .result-votes-list {
      width: 100%;
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow-sm);
      animation: slideUp 400ms 500ms cubic-bezier(.4, 0, .2, 1) both;
    }

    .result-votes-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--gray-400);
      margin-bottom: 12px;
    }

    .vote-result-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 0;
    }

    .vote-result-row + .vote-result-row {
      border-top: 1px solid var(--gray-100);
    }

    .vote-result-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--black);
      min-width: 60px;
    }

    .vote-result-bar-wrap {
      flex: 1;
      height: 8px;
      background: var(--gray-100);
      border-radius: 99px;
      overflow: hidden;
    }

    .vote-result-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width 600ms cubic-bezier(.4, 0, .2, 1);
    }

    .vote-result-bar-fill.top { background: var(--liar-color); }

    .vote-result-count {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray-600);
      min-width: 24px;
      text-align: right;
    }

    /* ─── Animations ───────────────────────────────────────────────── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .anim-in {
      animation: cardIn 350ms cubic-bezier(.4, 0, .2, 1) both;
    }

    /* ─── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--gray-800);
      color: var(--white);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      z-index: 999;
      transition: transform 300ms cubic-bezier(.34,1.56,.64,1), opacity 300ms ease;
      opacity: 0;
      pointer-events: none;
    }

    [data-theme="dark"] .toast {
      background: var(--gray-200);
      color: var(--black);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─── Responsive ────────────────────────────────────────────────── */
    @media (min-width: 480px) {
      .screen-inner { max-width: 480px; margin: 0 auto; width: 100%; }
      .vote-grid { grid-template-columns: repeat(4, 1fr); }
      .timer-ring { width: 200px; height: 200px; }
      .timer-center .timer-display { font-size: 52px; }
    }
  </style>
</head>
<body>

  <!-- ─── Topbar ──────────────────────────────────────────────────── -->
  <header class="game-topbar">
    <div class="topbar-left">
      <a href="index.html" class="btn-back" aria-label="게임 목록으로">←</a>

      <button class="btn-theme-toggle" id="btn-theme" aria-label="다크모드 전환">🌙</button>

  <main class="main">

    <!-- ══════════════════════════════════════════════════════════
         SCREEN 1: 설정
    ══════════════════════════════════════════════════════════ -->
    <section class="screen active" id="screen-setup">
      <div class="screen-inner">
        <div class="screen-hero">
          <span class="hero-icon">🤥</span>
          <h1 class="screen-title">라이어 게임</h1>

      <div class="screen-inner">
        <div class="screen-hero" style="margin-bottom:16px;">
          <h2 class="screen-title">역할 확인</h2>
          <p class="screen-desc">한 명씩 폰을 받아 자신의 역할을 확인하세요.<br>다른 사람은 보지 마세요!</p>
        </div>

        <div class="role-progress">
          <div class="role-progress-bar">
            <div class="role-progress-fill" id="role-progress-fill"></div>
          </div>
          <span class="role-progress-label" id="role-progress-label">0 / 0</span>

        <div class="role-reveal-area">
          <div class="flip-card" id="flip-card">
            <div class="flip-card-inner">
              <div class="flip-card-front" id="flip-front" onclick="revealRole()">
                <span class="tap-hint">👆</span>
                <span class="player-num" id="flip-player-num">플레이어 1번 확인</span>

              <div class="flip-card-back" id="flip-back">

    <section class="screen" id="screen-vote">
      <div class="screen-inner">
        <div class="screen-hero" style="margin-bottom:16px;">
          <span class="hero-icon">🗳️</span>

          <!-- populated by JS -->

         SCREEN 5: 결과

  </main>

  <div class="toast" id="toast"></div>

  <script src="shared/transitions.js"></script>
  <script>
  (function () {
    'use strict';

    /* ─── Topic Data ─────────────────────────────────────────── */
    var TOPICS = {
      food: {
        label: '음식',
        icon: '🍕',
        words: ['피자','김치','초콜릿','라면','치킨','떡볶이','스시','햄버거','삼겹살','마카롱','아이스크림','짜장면','케이크','비빔밥','붕어빵']
      },
      place: {
        label: '장소',
        icon: '🏫',
        words: ['학교','놀이공원','병원','도서관','편의점','노래방','찜질방','수영장','공항','백화점','영화관','카페','놀이터','기차역','해변']
      },
      animal: {
        label: '동물',
        icon: '🐧',
        words: ['강아지','고양이','펭귄','코끼리','돌고래','햄스터','앵무새','판다','사자','토끼','거북이','원숭이','부엉이','미어캣','고슴도치']
      },
      job: {
        label: '직업',
        icon: '👨‍⚕️',
        words: ['의사','선생님','소방관','요리사','경찰','가수','운동선수','과학자','우주비행사','변호사','유튜버','마술사','화가','건축가','수의사']
      },
      hobby: {
        label: '취미',
        icon: '🎮',
        words: ['요리','게임','독서','여행','사진','등산','낚시','그림','노래','영화감상','보드게임','자전거','캠핑','뜨개질','서핑']
      },
      media: {
        label: '영화/드라마',
        icon: '🎬',
        words: ['겨울왕국','해리포터','어벤져스','기생충','타이타닉','토이스토리','오징어게임','반지의제왕','스파이더맨','인터스텔라','알라딘','라이온킹','매트릭스','쥬라기공원','아바타']
      }
    };

    /* ─── State ──────────────────────────────────────────────── */
    var state = {
      playerCount: 5,
      selectedCats: ['food','place','animal','job','hobby','media'],
      liarIndex: -1,
      currentWord: '',
      currentCat: '',
      roles: [],           // array of 'citizen' or 'liar'
      currentRevealIdx: 0,
      revealed: false,
      timerTotal: 180,
      timerRemaining: 180,
      timerRunning: false,
      timerInterval: null,
      votes: {},           // playerIndex -> voted-for playerIndex
      circumference: 0
    };

    /* ─── Init ───────────────────────────────────────────────── */
    function init() {
      initTheme();
      buildCategoryGrid();
      setupPlayerCount();
      setupTimerRing();
    }

    /* ─── Theme ──────────────────────────────────────────────── */
    function initTheme() {
      var saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('btn-theme').textContent = saved === 'dark' ? '☀️' : '🌙';
    }

    document.getElementById('btn-theme').addEventListener('click', function () {
      var cur = document.documentElement.getAttribute('data-theme');
      var next = cur === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      this.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    /* ─── Screen Management ──────────────────────────────────── */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function (s) {
        s.classList.remove('active');
      });
      var el = document.getElementById(id);
      el.classList.add('active');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      window.scrollTo(0, 0);
    }

    window.showScreen = showScreen;

    /* ─── Category Grid ──────────────────────────────────────── */
    function buildCategoryGrid() {
      var grid = document.getElementById('category-grid');
      grid.innerHTML = '';
      Object.keys(TOPICS).forEach(function (key) {
        var t = TOPICS[key];
        var card = document.createElement('button');
        card.className = 'cat-card selected';
        card.setAttribute('data-cat', key);
        card.innerHTML =
          '<span class="cat-check">✓</span>' +
          '<span class="cat-icon">' + t.icon + '</span>' +
          '<span class="cat-name">' + t.label + '</span>' +
          '<span class="cat-count">' + t.words.length + '개</span>';
        card.addEventListener('click', function () { toggleCat(key, card); });
        grid.appendChild(card);
      });
    }

    function toggleCat(key, card) {
      var idx = state.selectedCats.indexOf(key);
      if (idx === -1) {
        state.selectedCats.push(key);
        card.classList.add('selected');
      } else {
        if (state.selectedCats.length <= 1) {
          showToast('최소 1개의 카테고리를 선택해야 합니다.');
          return;
        }
        state.selectedCats.splice(idx, 1);
        card.classList.remove('selected');
      }
    }

    /* ─── Player Count ───────────────────────────────────────── */
    function setupPlayerCount() {
      document.getElementById('btn-count-minus').addEventListener('click', function () {
        if (state.playerCount > 3) {
          state.playerCount--;
          updateCountDisplay();
        }
      });
      document.getElementById('btn-count-plus').addEventListener('click', function () {
        if (state.playerCount < 10) {
          state.playerCount++;
          updateCountDisplay();
        }
      });
      updateCountDisplay();
    }

    function updateCountDisplay() {
      document.getElementById('count-display').textContent = state.playerCount;
      document.getElementById('btn-count-minus').disabled = state.playerCount <= 3;
      document.getElementById('btn-count-plus').disabled = state.playerCount >= 10;
    }

    /* ─── Start Game ─────────────────────────────────────────── */
    document.getElementById('btn-start').addEventListener('click', function () {
      if (state.selectedCats.length === 0) {
        showToast('카테고리를 선택해주세요.');
        return;
      }
      startGame();
    });

    function startGame() {
      // Pick random category and word
      var catKey = state.selectedCats[Math.floor(Math.random() * state.selectedCats.length)];
      var words = TOPICS[catKey].words.slice();
      var word = words[Math.floor(Math.random() * words.length)];
      state.currentCat = catKey;
      state.currentWord = word;

      // Assign roles — one liar, rest citizens
      var n = state.playerCount;
      state.liarIndex = Math.floor(Math.random() * n);
      state.roles = [];
      for (var i = 0; i < n; i++) {
        state.roles.push(i === state.liarIndex ? 'liar' : 'citizen');
      }

      // Shuffle liar assignment: Fisher-Yates on roles array while tracking liarIndex
      var arr = [];
      for (var j = 0; j < n; j++) arr.push(j);
      for (var k = arr.length - 1; k > 0; k--) {
        var r = Math.floor(Math.random() * (k + 1));
        var tmp = arr[k]; arr[k] = arr[r]; arr[r] = tmp;
      }
      var shuffledRoles = new Array(n);
      for (var m = 0; m < n; m++) {
        shuffledRoles[m] = state.roles[arr[m]];
      }
      state.roles = shuffledRoles;
      // Re-find liar index after shuffle
      state.liarIndex = state.roles.indexOf('liar');

      state.currentRevealIdx = 0;
      state.revealed = false;
      state.votes = {};

      updateRoleScreen();
      showScreen('screen-roles');
    }

    /* ─── Role Reveal ────────────────────────────────────────── */
    function updateRoleScreen() {
      var n = state.playerCount;
      var idx = state.currentRevealIdx;

      // Progress
      document.getElementById('role-progress-fill').style.width = ((idx / n) * 100) + '%';
      document.getElementById('role-progress-label').textContent = idx + ' / ' + n;

      // Flip card front
      document.getElementById('flip-player-num').textContent = '플레이어 ' + (idx + 1) + '번 확인';

      // Reset flip card to front
      var flipCard = document.getElementById('flip-card');
      flipCard.classList.remove('revealed');
      state.revealed = false;

      // Hide confirm button and discussion start
      document.getElementById('role-confirm-btn').classList.remove('visible');
      document.getElementById('btn-discussion-start').style.display = 'none';
    }

    window.revealRole = function () {
      if (state.revealed) return;
      state.revealed = true;

      var idx = state.currentRevealIdx;
      var role = state.roles[idx];
      var back = document.getElementById('flip-back');

      back.className = 'flip-card-back ' + (role === 'liar' ? 'role-liar' : 'role-citizen');

      if (role === 'citizen') {
        back.innerHTML =
          '<span class="role-icon">👤</span>' +
          '<span class="role-name">시민</span>' +
          '<span class="role-topic-label">주제</span>' +
          '<span class="role-topic-word">' + state.currentWord + '</span>';
      } else {
        back.innerHTML =
          '<span class="role-icon">🤥</span>' +
          '<span class="role-name">라이어!</span>' +
          '<span class="role-liar-hint">당신은 라이어입니다.<br>주제를 모르는 척 버텨내세요!</span>';
      }

      document.getElementById('flip-card').classList.add('revealed');
      document.getElementById('role-confirm-btn').classList.add('visible');
    };

    window.confirmRole = function () {
      state.currentRevealIdx++;
      var n = state.playerCount;

      if (state.currentRevealIdx >= n) {
        // All players checked
        document.getElementById('role-progress-fill').style.width = '100%';
        document.getElementById('role-progress-label').textContent = n + ' / ' + n;

        var flipCard = document.getElementById('flip-card');
        flipCard.classList.remove('revealed');
        document.getElementById('role-confirm-btn').classList.remove('visible');

        // Show the flip front as a "done" state
        document.getElementById('flip-player-num').textContent = '모두 확인 완료!';
        document.getElementById('flip-front').onclick = null;
        var hint = document.querySelector('.flip-card-front .tap-hint');
        var label = document.querySelector('.flip-card-front .tap-label');
        if (hint) hint.textContent = '✅';
        if (label) label.textContent = '토론을 시작하세요';

        document.getElementById('btn-discussion-start').style.display = 'block';
      } else {
        updateRoleScreen();
      }
    };

    /* ─── Timer Ring ─────────────────────────────────────────── */
    function setupTimerRing() {
      var r = 44;
      state.circumference = 2 * Math.PI * r;
      var fill = document.getElementById('ring-fill');
      fill.style.strokeDasharray = state.circumference;
      fill.style.strokeDashoffset = '0';
      updateTimerDisplay();
    }

    function setTimerPreset(mins) {
      if (state.timerRunning) return;
      state.timerTotal = mins * 60;
      state.timerRemaining = mins * 60;
      document.querySelectorAll('.preset-btn').forEach(function (b) {
        b.classList.toggle('active', parseInt(b.getAttribute('data-mins')) === mins);
      });
      updateTimerDisplay();
      updateRingFill(1);
    }

    window.setTimerPreset = setTimerPreset;

    function updateTimerDisplay() {
      var m = Math.floor(state.timerRemaining / 60);
      var s = state.timerRemaining % 60;
      document.getElementById('timer-display').textContent =
        m + ':' + (s < 10 ? '0' : '') + s;

      var pct = state.timerRemaining / state.timerTotal;
      var disp = document.getElementById('timer-display');
      var ring = document.getElementById('ring-fill');

      disp.className = 'timer-display';
      ring.className = 'ring-fill';

      if (pct <= 0.2) {
        disp.classList.add('danger');
        ring.classList.add('danger');
      } else if (pct <= 0.4) {
        disp.classList.add('warning');
        ring.classList.add('warning');
      }

      updateRingFill(pct);
    }

    function updateRingFill(pct) {
      var fill = document.getElementById('ring-fill');
      fill.style.strokeDashoffset = state.circumference * (1 - pct);
    }

    window.toggleTimer = function () {
      if (state.timerRunning) {
        clearInterval(state.timerInterval);
        state.timerRunning = false;
        document.getElementById('btn-timer-toggle').textContent = '▶ 계속';
      } else {
        if (state.timerRemaining <= 0) return;
        state.timerRunning = true;
        document.getElementById('btn-timer-toggle').textContent = '⏸ 일시정지';
        state.timerInterval = setInterval(function () {
          state.timerRemaining--;
          updateTimerDisplay();
          if (state.timerRemaining <= 0) {
            clearInterval(state.timerInterval);
            state.timerRunning = false;
            document.getElementById('btn-timer-toggle').textContent = '▶ 시작';
            playTimerEnd();
            setTimeout(function () { goToVote(); }, 800);
          }
        }, 1000);
      }
    };

    window.goToVote = function () {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      state.votes = {};
      buildVoteGrid();
      showScreen('screen-vote');
    };

    /* ─── Vote ───────────────────────────────────────────────── */
    function buildVoteGrid() {
      var grid = document.getElementById('vote-grid');
      grid.innerHTML = '';
      for (var i = 0; i < state.playerCount; i++) {
        (function (idx) {
          var btn = document.createElement('button');
          btn.className = 'vote-player-btn';
          btn.setAttribute('data-player', idx);
          btn.innerHTML =
            '<span class="vote-badge">✓</span>' +
            '<span class="vote-player-icon">👤</span>' +
            '<span class="vote-player-name">' + (idx + 1) + '번</span>';
          btn.addEventListener('click', function () { castVote(idx, btn); });
          grid.appendChild(btn);
        })(i);
      }
      document.getElementById('btn-vote-done').disabled = true;
      document.getElementById('vote-info').textContent =
        '라이어라고 생각하는 플레이어를 선택하세요. (변경 가능)';
    }

    function castVote(playerIdx, btn) {
      // Single vote system — voter is anonymous, we track who is being voted for
      // For simplicity: each click on a player toggles/switches to that player
      // We simulate one "group vote" — the most-voted player is the suspect
      // Implementation: track last voted per "current voter"
      // Since we don't track who is voting, we use a simple toggle model:
      // clicking a player adds 1 to their tally (visual feedback only per session click)

      // Simple: each click = 1 vote for that player; clicking same removes it
      // We track votes as a set of "voters" clicking.
      // Since players vote in sequence, use an index-based voter turn.
      // Actually: simplest UX — everyone votes simultaneously by tapping a player.
      // Each player tapped once = selected; tap again = deselect.
      // Final count = how many times each was selected.

      // Toggle selection on the clicked button
      var wasVoted = btn.classList.contains('voted');
      btn.classList.toggle('voted', !wasVoted);

      // Count current votes
      var counts = {};
      document.querySelectorAll('.vote-player-btn.voted').forEach(function (b) {
        var p = parseInt(b.getAttribute('data-player'));
        counts[p] = (counts[p] || 0) + 1;
      });
      state.votes = counts;

      var totalVotes = Object.keys(counts).length;
      document.getElementById('btn-vote-done').disabled = totalVotes === 0;

      if (totalVotes > 0) {
        document.getElementById('vote-info').textContent =
          totalVotes + '명 지목됨. 투표 완료 버튼을 누르세요.';
      } else {
        document.getElementById('vote-info').textContent =
          '라이어라고 생각하는 플레이어를 선택하세요. (변경 가능)';
      }
    }

    /* ─── Results ────────────────────────────────────────────── */
    window.showResults = function () {
      // Tally votes
      var counts = {};
      for (var i = 0; i < state.playerCount; i++) counts[i] = 0;
      Object.keys(state.votes).forEach(function (p) {
        counts[parseInt(p)] = state.votes[p];
      });

      // Find most voted player(s)
      var maxVotes = 0;
      Object.keys(counts).forEach(function (p) {
        if (counts[p] > maxVotes) maxVotes = counts[p];
      });
      var topPlayers = [];
      Object.keys(counts).forEach(function (p) {
        if (counts[p] === maxVotes) topPlayers.push(parseInt(p));
      });

      // Is liar caught?
      var liarCaught = topPlayers.indexOf(state.liarIndex) !== -1 && maxVotes > 0;

      buildResultScreen(counts, maxVotes, liarCaught);
      showScreen('screen-result');
      playResultFanfare(liarCaught);
    };

    function buildResultScreen(counts, maxVotes, liarCaught) {
      var container = document.getElementById('result-reveal');
      container.innerHTML = '';

      // Outcome banner
      var banner = document.createElement('div');
      banner.className = 'result-outcome-banner ' + (liarCaught ? 'success' : 'fail');
      banner.innerHTML =
        '<span class="result-outcome-icon">' + (liarCaught ? '🎉' : '😈') + '</span>' +
        '<span class="result-outcome-text">' +
          (liarCaught ? '라이어 적발 성공!' : '라이어가 숨었습니다...') +
        '</span>';
      container.appendChild(banner);

      // Liar reveal
      var liarReveal = document.createElement('div');
      liarReveal.className = 'result-liar-reveal';
      liarReveal.innerHTML =
        '<div class="result-liar-avatar">🤥</div>' +
        '<div class="result-liar-info">' +
          '<div class="result-liar-label">라이어</div>' +
          '<div class="result-liar-name">' + (state.liarIndex + 1) + '번 플레이어</div>' +
        '</div>';
      container.appendChild(liarReveal);

      // Topic reveal
      var topicReveal = document.createElement('div');
      topicReveal.className = 'result-topic-reveal';
      topicReveal.innerHTML =
        '<div class="result-topic-label">정답 주제</div>' +
        '<div class="result-topic-word">' + state.currentWord + '</div>';
      container.appendChild(topicReveal);

      // Vote results
      var votesList = document.createElement('div');
      votesList.className = 'result-votes-list';
      votesList.innerHTML = '<div class="result-votes-title">투표 결과</div>';

      // Sort by vote count desc
      var sortedPlayers = Object.keys(counts).sort(function (a, b) {
        return counts[b] - counts[a];
      });

      sortedPlayers.forEach(function (p) {
        var row = document.createElement('div');
        row.className = 'vote-result-row';
        var pct = maxVotes > 0 ? (counts[p] / maxVotes * 100) : 0;
        var isTop = counts[p] === maxVotes && maxVotes > 0;
        row.innerHTML =
          '<span class="vote-result-name">' + (parseInt(p) + 1) + '번</span>' +
          '<div class="vote-result-bar-wrap">' +
            '<div class="vote-result-bar-fill' + (isTop ? ' top' : '') + '" style="width:0%" data-pct="' + pct + '"></div>' +
          '</div>' +
          '<span class="vote-result-count">' + counts[p] + '</span>';
        votesList.appendChild(row);
      });

      container.appendChild(votesList);

      // Animate bars after render
      setTimeout(function () {
        votesList.querySelectorAll('.vote-result-bar-fill').forEach(function (bar) {
          bar.style.width = bar.getAttribute('data-pct') + '%';
        });
      }, 600);
    }

    /* ─── Replay Actions ─────────────────────────────────────── */
    window.playAgainSame = function () {
      resetTimer();
      startGame();
    };

    window.playAgainNewTopic = function () {
      resetTimer();
      showScreen('screen-setup');
    };

    window.goHome = function () {
      resetTimer();
      showScreen('screen-setup');
    };

    function resetTimer() {
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      state.timerRemaining = state.timerTotal;
      updateTimerDisplay();
      document.getElementById('btn-timer-toggle').textContent = '▶ 시작';
    }

    /* ─── Audio Feedback ─────────────────────────────────────── */
    function playTimerEnd() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        [440, 550, 660].forEach(function (freq, i) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.15);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.3);
          osc.start(ctx.currentTime + i * 0.15);
          osc.stop(ctx.currentTime + i * 0.15 + 0.3);
        });
      } catch (e) { /* silent fail */ }
    }

    function playResultFanfare(success) {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var notes = success
          ? [523, 659, 784, 1047]   // C E G C — major chord arpeggio
          : [392, 370, 349, 330];   // descending minor for fail
        notes.forEach(function (freq, i) {
          var osc = ctx.createOscillator();
          var gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = freq;
          osc.type = success ? 'triangle' : 'sawtooth';
          gain.gain.setValueAtTime(0.12, ctx.currentTime + i * 0.12);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.4);
          osc.start(ctx.currentTime + i * 0.12);
          osc.stop(ctx.currentTime + i * 0.12 + 0.4);
        });
      } catch (e) { /* silent fail */ }
    }

    /* ─── Toast ──────────────────────────────────────────────── */
    var toastTimer = null;
    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () { t.classList.remove('show'); }, 2200);
    }

    /* ─── Boot ───────────────────────────────────────────────── */
    init();

  })();
  </script>
</body>
